<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Protheus System Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f2e8;
      --panel: #fffaf0;
      --ink: #1c1a17;
      --subtle: #726955;
      --line: rgba(28, 26, 23, 0.14);
      --accent: #d85c3b;
      --accent-2: #2b7a78;
      --directive: #2a6f97;
      --strategy: #7b2cbf;
      --campaign: #ff6b35;
      --proposal: #1d3557;
      --outcome: #2a9d8f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1100px 520px at 100% -10%, rgba(216, 92, 59, 0.18), transparent 60%),
        radial-gradient(900px 420px at -10% 0%, rgba(43, 122, 120, 0.17), transparent 58%),
        var(--bg);
    }
    .wrap {
      width: min(1400px, 96vw);
      margin: 18px auto 26px;
      display: grid;
      gap: 12px;
    }
    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
    }
    .hero h1 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0.01em;
    }
    .hero p {
      margin: 6px 0 0;
      color: var(--subtle);
      font-size: 0.92rem;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    select, button {
      font: inherit;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px 9px;
      background: #fff;
      color: var(--ink);
    }
    button {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
      cursor: pointer;
      font-weight: 700;
    }
    button:hover { filter: brightness(0.96); }
    .cards {
      display: grid;
      grid-template-columns: repeat(7, minmax(120px, 1fr));
      gap: 10px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
    }
    .card .k {
      font-size: 0.72rem;
      color: var(--subtle);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .card .v {
      margin-top: 4px;
      font-size: 1.12rem;
      font-weight: 700;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 12px;
      min-height: 620px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      overflow: hidden;
    }
    .panel h2 {
      margin: 0 0 8px;
      font-size: 0.92rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--subtle);
    }
    #graph {
      width: 100%;
      height: calc(100% - 22px);
      min-height: 570px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(246, 242, 232, 0.7));
    }
    .side {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
      min-height: 0;
    }
    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 6px;
      max-height: 270px;
      overflow: auto;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.77rem;
    }
    .list li {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: baseline;
      border-bottom: 1px dashed var(--line);
      padding-bottom: 4px;
    }
    .muted {
      color: var(--subtle);
      font-size: 0.76rem;
      font-family: "IBM Plex Mono", monospace;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-top: 8px;
      font-size: 0.75rem;
      color: var(--subtle);
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
      transform: translateY(1px);
    }
    @media (max-width: 1120px) {
      .cards { grid-template-columns: repeat(4, minmax(120px, 1fr)); }
      .grid { grid-template-columns: 1fr; }
      .side { grid-template-rows: auto auto; }
      #graph { min-height: 470px; }
    }
    @media (max-width: 760px) {
      .hero { grid-template-columns: 1fr; }
      .controls { justify-content: flex-start; }
      .cards { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div>
        <h1>System Organism Visualizer</h1>
        <p>Read-only topology of directives, strategy, campaigns, proposals, and outcomes.</p>
      </div>
      <div class="controls">
        <label for="hours">Window (hours)</label>
        <select id="hours">
          <option value="6">6h</option>
          <option value="12">12h</option>
          <option value="24" selected>24h</option>
          <option value="72">72h</option>
          <option value="168">7d</option>
        </select>
        <button id="refresh">Refresh</button>
      </div>
    </section>

    <section id="cards" class="cards"></section>

    <section class="grid">
      <article class="panel">
        <h2>Topology</h2>
        <svg id="graph" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet"></svg>
        <div class="legend">
          <span><i class="dot" style="background:var(--directive)"></i>Directive</span>
          <span><i class="dot" style="background:var(--strategy)"></i>Strategy</span>
          <span><i class="dot" style="background:var(--campaign)"></i>Campaign</span>
          <span><i class="dot" style="background:var(--proposal)"></i>Proposal</span>
          <span><i class="dot" style="background:var(--outcome)"></i>Outcome</span>
        </div>
      </article>
      <aside class="side">
        <article class="panel">
          <h2>Top Results</h2>
          <ul id="results" class="list"></ul>
        </article>
        <article class="panel">
          <h2>Top Rejected Gates</h2>
          <ul id="gates" class="list"></ul>
          <p id="meta" class="muted"></p>
        </article>
      </aside>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
