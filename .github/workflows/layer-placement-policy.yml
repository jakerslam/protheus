name: Layer Placement Policy

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  layer-placement-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve base ref
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"

      - name: Run layer placement policy check
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            node client/runtime/lib/ts_entrypoint.ts tests/tooling/scripts/ci/layer_placement_check.ts --base-ref=origin/${{ github.base_ref }}
          else
            node client/runtime/lib/ts_entrypoint.ts tests/tooling/scripts/ci/layer_placement_check.ts --base-ref=HEAD~1
          fi

      - name: Run ownership placement rationale guard
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            npm run -s ops:ownership:placement-rationale:guard -- --base-ref=origin/${{ github.base_ref }}
          else
            npm run -s ops:ownership:placement-rationale:guard -- --base-ref=HEAD~1
          fi
