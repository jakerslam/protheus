name: Kernel Nexus Coupling Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  kernel-nexus-coupling-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run kernel nexus coupling guard
        run: npm run -s ops:nexus:kernel-coupling:guard
