name: Nightly Policy Debt Audit

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

jobs:
  nightly-policy-debt-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run nightly debt audits
        run: |
          npm run -s ops:file-size:gate
          npm run -s ops:debt:expiry:guard
          npm run -s ops:tooling-registry:contract:guard
          npm run -s ops:srs:full:gate
          npm run -s ops:policy-debt:summary

      - name: Upload nightly debt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-policy-debt-audit
          path: |
            core/local/artifacts/repo_file_size_gate_current.json
            core/local/artifacts/debt_expiry_guard_current.json
            core/local/artifacts/tooling_registry_contract_guard_current.json
            core/local/artifacts/policy_debt_summary_current.json
            local/workspace/reports/POLICY_DEBT_SUMMARY_CURRENT.md
            local/workspace/reports/SRS_FULL_REGRESSION_CURRENT.md
          if-no-files-found: error
