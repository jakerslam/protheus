            client/runtime/local/state/release/licensing/release_licensing_manifest.json \
            client/runtime/local/state/release/scorecard/release_scorecard.json \
            core/local/artifacts/release_verdict_current.json; do
            [ -f "$f" ] || continue
            sha256sum "$f" >> "$OUT"
          done

      - name: Create release tag
        if: steps.semver.outputs.release_ready == '1'
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
        run: |
          TAG="${{ steps.semver.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            if [ -n "${RELEASE_GPG_PRIVATE_KEY:-}" ]; then
              printf '%s\n' "$RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import
              KEY_ID="$(gpg --list-secret-keys --keyid-format=long | awk '/sec/{print $2}' | head -n1 | sed 's#^.*/##')"
              if [ -n "$KEY_ID" ]; then
                git tag -s "${TAG}" -u "$KEY_ID" -m "Release ${TAG}"
              else
                echo "::warning::GPG key import failed; falling back to annotated tag."
                git tag -a "${TAG}" -m "Release ${TAG}"
              fi
            else
              echo "::warning::RELEASE_GPG_PRIVATE_KEY not configured; creating annotated tag."
              git tag -a "${TAG}" -m "Release ${TAG}"
            fi
            git push origin "${TAG}"
          fi

      - name: Publish GA release
        if: steps.semver.outputs.release_ready == '1'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.tag }}
          name: Infring ${{ steps.semver.outputs.tag }} (${{ steps.semver.outputs.release_channel }})
          draft: false
          prerelease: ${{ steps.semver.outputs.release_channel != 'stable' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body_path: client/runtime/local/state/release/CHANGELOG.auto.md
          files: |
