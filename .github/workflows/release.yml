name: Release GA

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_channel:
        description: Release channel
        required: false
        default: alpha
        type: choice
        options:
          - alpha
          - beta
          - stable

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

jobs:
  windows-prebuilt:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows prebuilt binaries
        shell: pwsh
        run: |
          cargo build --release --manifest-path core/layer0/ops/Cargo.toml --bin infring-ops
          cargo build --release --manifest-path core/layer0/ops/Cargo.toml --bin infringd
          cargo build --release -p conduit --bin conduit_daemon
          cargo build --release --manifest-path client/pure-workspace/Cargo.toml --bin infring-pure-workspace
          New-Item -ItemType Directory -Force -Path client/runtime/local/state/release/artifacts | Out-Null
          Copy-Item -Force target/release/infring-ops.exe client/runtime/local/state/release/artifacts/infring-ops-x86_64-pc-windows-msvc.exe
          Copy-Item -Force target/release/infringd.exe client/runtime/local/state/release/artifacts/infringd-x86_64-pc-windows-msvc.exe
          Copy-Item -Force target/release/infringd.exe client/runtime/local/state/release/artifacts/infringd-tiny-max-x86_64-pc-windows-msvc.exe
          Copy-Item -Force target/release/conduit_daemon.exe client/runtime/local/state/release/artifacts/conduit_daemon-x86_64-pc-windows-msvc.exe
          Copy-Item -Force target/release/infring-pure-workspace.exe client/runtime/local/state/release/artifacts/infring-pure-workspace-x86_64-pc-windows-msvc.exe
          Copy-Item -Force target/release/infring-pure-workspace.exe client/runtime/local/state/release/artifacts/infring-pure-workspace-tiny-max-x86_64-pc-windows-msvc.exe

      - name: Upload Windows prebuilt artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-prebuilt
          path: client/runtime/local/state/release/artifacts/*.exe
          if-no-files-found: error

  release:
    needs:
      - windows-prebuilt
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install dependencies
        run: npm ci

      - name: Resolve release channel
        id: channel
        run: |
          CHANNEL_INPUT="${{ github.event.inputs.release_channel }}"
          if [ -z "$CHANNEL_INPUT" ]; then
            CHANNEL_INPUT="$(node -e 'const fs=require("fs");let ch="alpha";try{const p=JSON.parse(fs.readFileSync("client/runtime/config/release_channel_policy.json","utf8"));if(typeof p.default_channel==="string"&&p.default_channel.trim()) ch=p.default_channel.trim().toLowerCase();}catch{};if(!["alpha","beta","stable"].includes(ch)) ch="alpha";process.stdout.write(ch);')"
          fi
          echo "release_channel=${CHANNEL_INPUT}" >> "$GITHUB_OUTPUT"
          echo "Release channel: ${CHANNEL_INPUT}"

      - name: Conventional commit gate (release range)
        id: conventional_commit_gate
        run: |
          node client/runtime/lib/ts_entrypoint.ts tests/tooling/scripts/ci/conventional_commit_gate.ts \
            --to=HEAD \
            --strict=0 \
            --out=core/local/artifacts/conventional_commit_gate_current.json

      - name: Release Runtime Contract Gate
        run: npm run -s ops:release-contract:gate

      - name: SRS Full Regression Gate (Strict)
        run: npm run -s ops:srs:full:gate

      - name: Resolve semantic release plan (conventional commits)
        id: semver
        run: |
          node client/runtime/lib/ts_entrypoint.ts client/runtime/systems/ops/release_semver_contract.ts run --strict=1 --write=1 --channel=${{ steps.channel.outputs.release_channel }} > /tmp/release-plan.json
          cat /tmp/release-plan.json
          RELEASE_READY="$(node -e 'const fs=require("fs");const p=JSON.parse(fs.readFileSync("/tmp/release-plan.json","utf8"));process.stdout.write(p.release_ready?"1":"0");')"
          TAG="$(node -e 'const fs=require("fs");const p=JSON.parse(fs.readFileSync("/tmp/release-plan.json","utf8"));process.stdout.write(String(p.next_tag||"none"));')"
          PREVIOUS_TAG="$(node -e 'const fs=require("fs");const p=JSON.parse(fs.readFileSync("/tmp/release-plan.json","utf8"));process.stdout.write(String(p.previous_tag||"none"));')"
          NEXT_VERSION="$(node -e 'const fs=require("fs");const p=JSON.parse(fs.readFileSync("/tmp/release-plan.json","utf8"));process.stdout.write(String(p.next_version||"0.0.0"));')"
          RELEASE_CHANNEL="$(node -e 'const fs=require("fs");const p=JSON.parse(fs.readFileSync("/tmp/release-plan.json","utf8"));process.stdout.write(String(p.release_channel||"stable"));')"
          echo "release_ready=${RELEASE_READY}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
          echo "next_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_channel=${RELEASE_CHANNEL}" >> "$GITHUB_OUTPUT"

      - name: Stop when no releasable conventional commits
        if: steps.semver.outputs.release_ready != '1'
        run: |
          echo "No conventional commit requiring a release."
          exit 0

      - name: Persist release version files to main (optional)
        if: steps.semver.outputs.release_ready == '1' && vars.INFRING_RELEASE_PERSIST_VERSION == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json client/runtime/config/runtime_version.json
          if git diff --cached --quiet; then
            echo "No version files changed."
            exit 0
          fi
          git commit -m "chore(release): ${{ steps.semver.outputs.tag }} [skip ci]"
          git push origin HEAD:main

      - name: Generate release changelog (grouped)
        if: steps.semver.outputs.release_ready == '1'
        id: changelog
        run: |
          node client/runtime/lib/ts_entrypoint.ts tests/tooling/scripts/ci/release_changelog_generate.ts \
            --previous-tag=${{ steps.semver.outputs.previous_tag }} \
            --next-tag=${{ steps.semver.outputs.tag }} \
            --channel=${{ steps.semver.outputs.release_channel }} \
            --out=client/runtime/local/state/release/CHANGELOG.auto.md

      - name: Generate release licensing manifest
        if: steps.semver.outputs.release_ready == '1'
        run: |
          node <<'NODE'
          const fs = require('fs');
          const crypto = require('crypto');

          const matrixPath = 'LICENSE_MATRIX.json';
          const outPath = 'client/runtime/local/state/release/licensing/release_licensing_manifest.json';
          const matrix = JSON.parse(fs.readFileSync(matrixPath, 'utf8'));
          const expression = String(matrix?.release_metadata?.release_bundle_spdx || '').trim();
          if (!expression) {
            throw new Error('release_bundle_spdx missing in LICENSE_MATRIX.json');
          }
          const matrixDigest = crypto
            .createHash('sha256')
            .update(fs.readFileSync(matrixPath))
            .digest('hex');
          const payload = {
            schema_id: 'infring_release_licensing_manifest',
            schema_version: '1.0',
            generated_at: new Date().toISOString(),
            source_matrix_path: matrixPath,
            source_matrix_sha256: matrixDigest,
            license_expression: expression,
            default_spdx: String(matrix?.default_spdx || '').trim(),
            precedence: Array.isArray(matrix?.precedence) ? matrix.precedence : [],
          };
          fs.mkdirSync('client/runtime/local/state/release/licensing', { recursive: true });
          fs.writeFileSync(outPath, JSON.stringify(payload, null, 2) + '\n');
          NODE

      - name: Release policy + compatibility + migration gate
        if: steps.semver.outputs.release_ready == '1'
        id: policy_gate
        run: |
          node client/runtime/lib/ts_entrypoint.ts tests/tooling/scripts/ci/release_policy_gate.ts \
            --strict=1 \
            --out=core/local/artifacts/release_policy_gate_current.json

      - name: Release topology, compatibility, and recovery evidence
        if: steps.semver.outputs.release_ready == '1'
        run: |
          npm run -s ops:release:rc-rehearsal
          npm run -s ops:ipc-bridge:soak

      - name: Benchmark public artifact gate
        if: steps.semver.outputs.release_ready == '1'
        run: |
          npm run -s ops:benchmark:sanity
          npm run -s ops:benchmark:public-audit

      - name: Canary gate with rollback enforcement
        if: steps.semver.outputs.release_ready == '1'
        id: canary_gate
        run: |
          set -euo pipefail
          mkdir -p core/local/artifacts
          if cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin infring-ops -- \
            release-gate-canary-rollback-enforcer gate --strict=1 > /tmp/release-canary.json; then
            cp /tmp/release-canary.json core/local/artifacts/release_canary_gate_current.json
            cat /tmp/release-canary.json
            exit 0
          fi
          cp /tmp/release-canary.json core/local/artifacts/release_canary_gate_current.json || true
          cat /tmp/release-canary.json || true
          if [ "${{ steps.semver.outputs.release_channel }}" = "stable" ]; then
            echo "::error::Stable channel requires passing canary rollback gate."
            exit 1
          fi
          echo "::warning::Canary gate failed but non-stable channel allows continued release."

      - name: Auto rollback stale tag on canary failure
        if: failure() && steps.semver.outputs.release_ready == '1'
        run: |
          set -euo pipefail
          TAG="${{ steps.semver.outputs.tag }}"
          if git ls-remote --tags origin "${TAG}" | grep -q "${TAG}$"; then
            git push origin ":refs/tags/${TAG}" || true
            echo "::warning::Removed stale tag ${TAG} after failed gate."
          fi

      - name: Setup Nix
        if: steps.semver.outputs.release_ready == '1'
        uses: DeterminateSystems/nix-installer-action@main

      - name: Install cargo-dist and musl toolchain
        if: steps.semver.outputs.release_ready == '1'
        run: |
          cargo install cargo-dist --locked --version 0.28.0
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build release binaries
        if: steps.semver.outputs.release_ready == '1'
        run: |
          set -euo pipefail
          cargo build --release --manifest-path core/layer0/ops/Cargo.toml --bin infring-ops
          cargo build --release --target x86_64-unknown-linux-musl --manifest-path core/layer0/ops/Cargo.toml --bin infringd
          cargo build --release -p conduit --bin conduit_daemon
          strip target/x86_64-unknown-linux-musl/release/infringd || true
          nix --extra-experimental-features "nix-command flakes" shell nixpkgs#coreutils --command \
            dist --version
          mkdir -p client/runtime/local/state/release/artifacts
          cp target/release/infring-ops \
            client/runtime/local/state/release/artifacts/infring-ops-x86_64-unknown-linux-gnu
          cp target/release/conduit_daemon \
            client/runtime/local/state/release/artifacts/conduit_daemon-x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-musl/release/infringd \
            client/runtime/local/state/release/artifacts/infringd-x86_64-unknown-linux-musl
          npm pack --silent

      - name: Download Windows prebuilt artifacts
        if: steps.semver.outputs.release_ready == '1'
        uses: actions/download-artifact@v4
        with:
          name: release-windows-prebuilt
          path: client/runtime/local/state/release/artifacts

      - name: Enforce Windows prebuilt artifact baseline
        if: steps.semver.outputs.release_ready == '1'
        run: |
          set -euo pipefail
          REQUIRED=(
            "infring-ops-x86_64-pc-windows-msvc.exe"
            "infringd-x86_64-pc-windows-msvc.exe"
            "infringd-tiny-max-x86_64-pc-windows-msvc.exe"
            "conduit_daemon-x86_64-pc-windows-msvc.exe"
            "infring-pure-workspace-x86_64-pc-windows-msvc.exe"
            "infring-pure-workspace-tiny-max-x86_64-pc-windows-msvc.exe"
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "client/runtime/local/state/release/artifacts/$f" ]; then
              echo "::error::missing required Windows prebuilt release asset: $f"
              exit 1
            fi
          done

      - name: Enforce static infringd size gate (35 MB)
        if: steps.semver.outputs.release_ready == '1'
        id: size_gate
        run: |
          set -euo pipefail
          BIN="client/runtime/local/state/release/artifacts/infringd-x86_64-unknown-linux-musl"
          SIZE_BYTES="$(wc -c < "$BIN" | tr -d ' ')"
          SIZE_MB="$(awk -v b="$SIZE_BYTES" 'BEGIN { printf "%.2f", b/(1024*1024) }')"
          MAX_BYTES=$((35 * 1024 * 1024))
          echo "infringd_static_size_bytes=${SIZE_BYTES}" >> "$GITHUB_OUTPUT"
          echo "infringd_static_size_mb=${SIZE_MB}" >> "$GITHUB_OUTPUT"
          if [ "$SIZE_BYTES" -gt "$MAX_BYTES" ]; then
            echo "::error::infringd static musl binary is ${SIZE_MB} MB, exceeds the 35 MB CI gate."
            exit 1
          fi
          cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin infring-ops -- \
            top1-assurance size-gate --strict=1 \
            --binary-path=client/runtime/local/state/release/artifacts/infringd-x86_64-unknown-linux-musl \
            --max-mb=35
          echo "infringd static binary: ${SIZE_MB} MB (musl)"

      - name: Append static binary size to release notes
        if: steps.semver.outputs.release_ready == '1'
        run: |
          printf '\ninfringd static binary: %s MB (musl)\n' \
            "${{ steps.size_gate.outputs.infringd_static_size_mb }}" \
            >> client/runtime/local/state/release/CHANGELOG.auto.md

      - name: Install Syft
        if: steps.semver.outputs.release_ready == '1'
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft version

      - name: Generate SPDX SBOM artifacts
        if: steps.semver.outputs.release_ready == '1'
        run: |
          mkdir -p client/runtime/local/state/release/sbom
          PKG=$(ls -1 *.tgz | head -n 1)
          syft file:client/runtime/local/state/release/artifacts/infring-ops-x86_64-unknown-linux-gnu -o spdx-json=client/runtime/local/state/release/sbom/infring-ops.spdx.json
          syft file:client/runtime/local/state/release/artifacts/infringd-x86_64-unknown-linux-musl -o spdx-json=client/runtime/local/state/release/sbom/infringd.spdx.json
          syft file:client/runtime/local/state/release/artifacts/conduit_daemon-x86_64-unknown-linux-gnu -o spdx-json=client/runtime/local/state/release/sbom/conduit_daemon.spdx.json
          syft file:client/runtime/local/state/release/artifacts/infring-ops-x86_64-pc-windows-msvc.exe -o spdx-json=client/runtime/local/state/release/sbom/infring-ops-windows.spdx.json
          syft file:client/runtime/local/state/release/artifacts/infringd-x86_64-pc-windows-msvc.exe -o spdx-json=client/runtime/local/state/release/sbom/infringd-windows.spdx.json
          syft file:client/runtime/local/state/release/artifacts/conduit_daemon-x86_64-pc-windows-msvc.exe -o spdx-json=client/runtime/local/state/release/sbom/conduit_daemon-windows.spdx.json
          syft file:client/runtime/local/state/release/artifacts/infring-pure-workspace-x86_64-pc-windows-msvc.exe -o spdx-json=client/runtime/local/state/release/sbom/infring-pure-workspace-windows.spdx.json
          syft file:${PKG} -o spdx-json=client/runtime/local/state/release/sbom/infring-npm.spdx.json

      - name: Sign release artifacts
        if: steps.semver.outputs.release_ready == '1'
        env:
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p client/runtime/local/state/release/signatures
          if [ -n "${RELEASE_SIGNING_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "$RELEASE_SIGNING_PRIVATE_KEY" > /tmp/release_private.pem
          else
            openssl genrsa -out /tmp/release_private.pem 4096
          fi
          openssl rsa -in /tmp/release_private.pem -pubout -out client/runtime/local/state/release/signatures/release_public.pem
          for f in \
            client/runtime/local/state/release/artifacts/infring-ops-x86_64-unknown-linux-gnu \
            client/runtime/local/state/release/artifacts/infringd-x86_64-unknown-linux-musl \
            client/runtime/local/state/release/artifacts/conduit_daemon-x86_64-unknown-linux-gnu \
            client/runtime/local/state/release/artifacts/infring-ops-x86_64-pc-windows-msvc.exe \
            client/runtime/local/state/release/artifacts/infringd-x86_64-pc-windows-msvc.exe \
            client/runtime/local/state/release/artifacts/conduit_daemon-x86_64-pc-windows-msvc.exe \
            client/runtime/local/state/release/artifacts/infring-pure-workspace-x86_64-pc-windows-msvc.exe \
            client/runtime/local/state/release/artifacts/infringd-tiny-max-x86_64-pc-windows-msvc.exe \
            client/runtime/local/state/release/artifacts/infring-pure-workspace-tiny-max-x86_64-pc-windows-msvc.exe \
            client/runtime/local/state/release/sbom/infring-ops.spdx.json \
            client/runtime/local/state/release/sbom/infringd.spdx.json \
            client/runtime/local/state/release/sbom/conduit_daemon.spdx.json \
            client/runtime/local/state/release/sbom/infring-ops-windows.spdx.json \
            client/runtime/local/state/release/sbom/infringd-windows.spdx.json \
            client/runtime/local/state/release/sbom/conduit_daemon-windows.spdx.json \
            client/runtime/local/state/release/sbom/infring-pure-workspace-windows.spdx.json \
            client/runtime/local/state/release/sbom/infring-npm.spdx.json; do
            base=$(basename "$f")
            openssl dgst -sha256 -sign /tmp/release_private.pem -out "client/runtime/local/state/release/signatures/${base}.sig" "$f"
          done

      - name: Generate release scorecard
        if: steps.semver.outputs.release_ready == '1'
        id: release_scorecard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BASELINE_ARGS=()
          if [ "${{ steps.semver.outputs.previous_tag }}" != "none" ]; then
            mkdir -p /tmp/release-baseline
            gh release download "${{ steps.semver.outputs.previous_tag }}" \
              --repo "${{ github.repository }}" \
              --pattern "release_scorecard.json" \
              --dir /tmp/release-baseline
            BASELINE_ARGS+=(
              --baseline=/tmp/release-baseline/release_scorecard.json
              --baseline-tag=${{ steps.semver.outputs.previous_tag }}
              --require-baseline=1
            )
          else
            BASELINE_ARGS+=(--require-baseline=0)
          fi
          node client/runtime/lib/ts_entrypoint.ts tests/tooling/scripts/ci/release_scorecard_generate.ts \
            --out=client/runtime/local/state/release/scorecard/release_scorecard.json \
            --strict=1 \
            --semver=/tmp/release-plan.json \
            --commit-lint=core/local/artifacts/conventional_commit_gate_current.json \
            --policy=core/local/artifacts/release_policy_gate_current.json \
            --canary=core/local/artifacts/release_canary_gate_current.json \
            --closure-policy=client/runtime/config/production_readiness_closure_policy.json \
            --support-bundle=core/local/artifacts/support_bundle_latest.json \
            --topology=core/local/artifacts/production_topology_diagnostic_current.json \
            --state-compat=core/local/artifacts/stateful_upgrade_rollback_gate_current.json \
            --blockers=core/local/artifacts/release_blocker_rubric_current.json \
            --closure=core/local/artifacts/production_readiness_closure_gate_current.json \
            --hardening=core/local/artifacts/release_hardening_window_guard_current.json \
            --ipc-soak=local/state/ops/ops_ipc_bridge_stability_soak/latest.json \
            --dr=local/state/ops/dr_gameday/latest.json \
            --changelog=client/runtime/local/state/release/CHANGELOG.auto.md \
            --require-release-artifacts=1 \
            "${BASELINE_ARGS[@]}"

      - name: Refresh closure evidence after final scorecard
        if: steps.semver.outputs.release_ready == '1'
        run: |
          npm run -s ops:production-closure:gate

      - name: Generate release verdict
        if: steps.semver.outputs.release_ready == '1'
        run: |
          npm run -s ops:release:verdict

      - name: Refresh support bundle incident truth package
        if: steps.semver.outputs.release_ready == '1'
        run: |
          npm run -s ops:support-bundle:export

      - name: Generate release SHA256SUMS
        if: steps.semver.outputs.release_ready == '1'
        run: |
          set -euo pipefail
          OUT="client/runtime/local/state/release/artifacts/SHA256SUMS"
          : > "$OUT"
          for f in \
            client/runtime/local/state/release/artifacts/infring-ops-x86_64-unknown-linux-gnu \
            client/runtime/local/state/release/artifacts/infringd-x86_64-unknown-linux-musl \
            client/runtime/local/state/release/artifacts/conduit_daemon-x86_64-unknown-linux-gnu \
            client/runtime/local/state/release/artifacts/infring-ops-x86_64-pc-windows-msvc.exe \
            client/runtime/local/state/release/artifacts/infringd-x86_64-pc-windows-msvc.exe \
            client/runtime/local/state/release/artifacts/infringd-tiny-max-x86_64-pc-windows-msvc.exe \
            client/runtime/local/state/release/artifacts/conduit_daemon-x86_64-pc-windows-msvc.exe \
            client/runtime/local/state/release/artifacts/infring-pure-workspace-x86_64-pc-windows-msvc.exe \
            client/runtime/local/state/release/artifacts/infring-pure-workspace-tiny-max-x86_64-pc-windows-msvc.exe \
            *.tgz \
            client/runtime/local/state/release/sbom/infring-ops.spdx.json \
            client/runtime/local/state/release/sbom/infringd.spdx.json \
            client/runtime/local/state/release/sbom/conduit_daemon.spdx.json \
            client/runtime/local/state/release/sbom/infring-ops-windows.spdx.json \
            client/runtime/local/state/release/sbom/infringd-windows.spdx.json \
            client/runtime/local/state/release/sbom/conduit_daemon-windows.spdx.json \
            client/runtime/local/state/release/sbom/infring-pure-workspace-windows.spdx.json \
            client/runtime/local/state/release/sbom/infring-npm.spdx.json \
            client/runtime/local/state/release/signatures/infring-ops-x86_64-unknown-linux-gnu.sig \
            client/runtime/local/state/release/signatures/infringd-x86_64-unknown-linux-musl.sig \
            client/runtime/local/state/release/signatures/conduit_daemon-x86_64-unknown-linux-gnu.sig \
            client/runtime/local/state/release/signatures/infring-ops-x86_64-pc-windows-msvc.exe.sig \
            client/runtime/local/state/release/signatures/infringd-x86_64-pc-windows-msvc.exe.sig \
            client/runtime/local/state/release/signatures/infringd-tiny-max-x86_64-pc-windows-msvc.exe.sig \
            client/runtime/local/state/release/signatures/conduit_daemon-x86_64-pc-windows-msvc.exe.sig \
            client/runtime/local/state/release/signatures/infring-pure-workspace-x86_64-pc-windows-msvc.exe.sig \
            client/runtime/local/state/release/signatures/infring-pure-workspace-tiny-max-x86_64-pc-windows-msvc.exe.sig \
            client/runtime/local/state/release/signatures/infring-ops.spdx.json.sig \
            client/runtime/local/state/release/signatures/infringd.spdx.json.sig \
            client/runtime/local/state/release/signatures/conduit_daemon.spdx.json.sig \
            client/runtime/local/state/release/signatures/infring-ops-windows.spdx.json.sig \
            client/runtime/local/state/release/signatures/infringd-windows.spdx.json.sig \
            client/runtime/local/state/release/signatures/conduit_daemon-windows.spdx.json.sig \
            client/runtime/local/state/release/signatures/infring-pure-workspace-windows.spdx.json.sig \
            client/runtime/local/state/release/signatures/infring-npm.spdx.json.sig \
