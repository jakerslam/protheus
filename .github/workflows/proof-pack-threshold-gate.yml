name: Proof Pack Threshold Gate

on:
  pull_request:
    branches: [main, rust50]
  push:
    branches: [main, rust50]
  workflow_dispatch:

jobs:
  proof-pack-threshold-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate proof-pack closure artifacts
        run: |
          if [ ! -f artifacts/web_tooling_context_soak_report_latest.json ]; then
            node client/runtime/lib/ts_entrypoint.ts tests/tooling/scripts/ci/web_tooling_context_soak.ts || true
          fi
          if [ ! -f artifacts/workspace_tooling_context_soak_report_latest.json ]; then
            node client/runtime/lib/ts_entrypoint.ts tests/tooling/scripts/ci/workspace_tooling_context_soak.ts || true
          fi
          npm run -s ops:runtime-proof:verify
          npm run -s ops:layer2:parity:guard
          npm run -s ops:layer2:receipt:replay
          npm run -s ops:trusted-core:report
          npm run -s ops:srs:same-revision:guard
          npm run -s ops:srs:todo-section:guard
          npm run -s ops:release:proof-pack -- --version=main-current

      - name: Run proof-pack threshold gate (dockerized)
        run: |
          npm run -s ops:proof-pack:gate:docker
          npm run -s ops:top1:comparison

      - name: Upload proof-pack threshold artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proof-pack-threshold-artifacts
          path: |
            core/local/artifacts/runtime_proof_verify_current.json
            core/local/artifacts/runtime_proof_synthetic_canary_current.json
            core/local/artifacts/runtime_proof_empirical_release_evidence_current.json
            core/local/artifacts/runtime_proof_empirical_trends_current.json
            core/local/state/ops/runtime_proof_empirical_history.jsonl
            core/local/artifacts/layer2_lane_parity_guard_current.json
            core/local/artifacts/layer2_receipt_replay_current.json
            core/local/artifacts/runtime_trusted_core_report_current.json
            core/local/artifacts/srs_same_revision_guard_current.json
            core/local/artifacts/gateway_support_levels_current.json
            core/local/artifacts/srs_todo_section_guard_current.json
            core/local/artifacts/release_proof_pack_current.json
            releases/proof-packs/main-current/**
            core/local/state/ops/top1_assurance/latest.json
            core/local/state/ops/top1_assurance/history.jsonl
            core/local/state/ops/top1_assurance/benchmark_latest.json
            docs/comparison/infring_vs_x.md
          if-no-files-found: warn
