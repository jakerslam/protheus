name: External Validation Evidence Cadence

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * 1"

jobs:
  cadence:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run public evidence cadence lanes
        run: |
          npm run -s ops:benchmark:public-audit
          npm run -s ops:external-validation:evidence:cadence

      - name: Upload cadence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-validation-evidence-cadence
          path: |
            core/local/artifacts/benchmark_public_audit_current.json
            core/local/artifacts/external_validation_evidence_cadence_current.json
            local/workspace/reports/EXTERNAL_VALIDATION_EVIDENCE_CADENCE_CURRENT.md
          if-no-files-found: warn
