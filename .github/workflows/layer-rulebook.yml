name: layer-rulebook

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  enforce-layer-rulebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run layer rulebook gate
        run: tests/tooling/scripts/ci/layer_rulebook_check.sh
