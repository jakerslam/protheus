name: Ownership Drift Weekly

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

jobs:
  ownership-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ownership drift guard (strict)
        run: npm run -s ops:ownership:drift:guard

      - name: Ownership drift weekly report (high-severity threshold)
        run: npm run -s ops:ownership:drift:weekly

      - name: Upload ownership drift artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ownership-drift-weekly-artifacts
          path: |
            core/local/artifacts/ownership_drift_guard_current.json
            core/local/artifacts/ownership_drift_weekly_current.json
            local/workspace/reports/OWNERSHIP_DRIFT_GUARD_CURRENT.md
            local/workspace/reports/OWNERSHIP_DRIFT_WEEKLY_CURRENT.md
            local/workspace/reports/ownership_drift_report.md
          if-no-files-found: warn
