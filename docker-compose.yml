services:
  infring:
    image: infring:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infring
    command:
      [
        "node",
        "client/runtime/lib/ts_entrypoint.ts",
        "client/runtime/systems/ui/infring_dashboard.ts",
        "serve",
        "--host=0.0.0.0",
        "--port=4173",
        "--team=ops",
        "--refresh-ms=2000"
      ]
    environment:
      CLEARANCE: "3"
      NODE_ENV: "production"
      SPINE_PUBLIC_BENCHMARK_ENABLED: "0"
    restart: unless-stopped
    # NOTE(rohan): Using unless-stopped to allow manual intervention during incidents
    # while still ensuring automatic recovery for transient failures.
    # This balances operational flexibility with reliability requirements.
    read_only: true
    tmpfs:
      - /tmp
      - /app/tmp
    volumes:
      - ./state:/app/state
      - ./logs:/app/logs
      - ./secrets:/app/secrets:ro
