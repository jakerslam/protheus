version: v1
kind: openshell_policy
mode: production
sandbox:
  enabled: true
conduit:
  enforce: true
filesystem:
  allow:
    - /users/jay/.control_runtime/workspace/
    - /tmp/
  deny:
    - /etc/
    - /private/
network:
  allow_hosts:
    - api.openai.com
    - api.frontier_provider.com
    - localhost
    - 127.0.0.1
  deny_hosts:
    - metadata.google.internal
    - 169.254.169.254
credentials:
  required: true
  allow:
    - openai_api_key
    - frontier_provider_api_key
privacy:
  redact_patterns:
    - sk-
    - bearer
    - api_key
  block_patterns:
    - ssn
    - private key
    - mnemonics
