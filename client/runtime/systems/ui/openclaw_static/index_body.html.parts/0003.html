        <div class="messages" id="messages" @scroll.passive="handleMessagesScroll($event)" @dragover.prevent="dragOver = true" @dragleave="dragOver = false" @drop.prevent="handleDrop($event); dragOver = false" @mouseenter="handleMessagesPointerMove($event)" @mousemove="handleMessagesPointerMove($event)" @mousedown="handleMessagesPointerDown($event)" @mouseleave="clearPointerFx($event)">

                            <button class="message-stat-btn" :class="{ copied: msg._copied }" @click="copyMessage(msg)" :title="msg._copied ? 'Copied' : 'Copy message'">
                              <svg x-show="!msg._copied" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                              <svg x-show="msg._copied" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
                            </button>
                            <button class="message-stat-btn" x-show="messageHasTools(msg)" @click="toggleMessageTools(msg)" :title="allToolsCollapsed(msg) ? 'Expand processes' : 'Collapse processes'">
                              <svg x-show="allToolsCollapsed(msg)" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"></path></svg>
                              <svg x-show="!allToolsCollapsed(msg)" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"></path></svg>
                            </button>
                            <span class="message-stat-time" x-text="messageTs(msg)" x-show="messageTs(msg)"></span>
                            <span class="message-stat-meta" x-text="msg.meta" x-show="msg.meta"></span>
                          </div>
                        </div>
                      </div>
                    </template>
                    <template x-if="!msg.is_notice && !shouldRenderMessage(msg, idx)">
                      <div class="message message-placeholder-shell" :class="messageRoleClass(msg)">
                        <div class="message-avatar" x-show="msg.role === 'agent'">
                          <span class="agent-mark" aria-hidden="true">&infin;</span>
                        </div>
                        <div class="message-body">
                          <div class="message-agent-name" x-show="msg.role === 'agent'" x-text="messageAgentLabel(msg)"></div>
                          <div class="message-bubble message-placeholder-bubble">
                            <span class="message-placeholder-line skeleton" aria-hidden="true"></span>
                          </div>
                          <div class="message-stats-row message-stats-row-static">
                            <span class="message-stat-time" x-text="messageTs(msg)" x-show="messageTs(msg)"></span>
                          </div>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
                <div class="chat-init-panel" x-show="showFreshArchetypeTiles && freshInitRevealMenu">
                  <div class="chat-archetype-title">Initialize Agent</div>
                  <div class="chat-archetype-subtitle">Pick role and lifespan, then launch. Optional tuning lives under advanced setup.</div>
                  <div class="chat-init-identity-row">
                    <div class="chat-agent-identity-avatar-wrap chat-init-avatar-wrap" @click.outside="freshInitEmojiPickerOpen = false">
                      <span class="chat-init-avatar-preview" aria-hidden="true">
                        <img
                          x-show="freshInitAvatarUrl"
                          :src="freshInitAvatarUrl"
                          :alt="currentAgent ? ((currentAgent.name || currentAgent.id || 'agent') + ' avatar') : 'agent avatar'"
                          loading="lazy"
                        />
                        <span x-show="!freshInitAvatarUrl" x-text="freshInitEmoji || ((currentAgent && currentAgent.identity && currentAgent.identity.emoji) || '🤖')"></span>
                      </span>
                      <input
                        type="file"
                        x-ref="freshInitAvatarInput"
                        accept="image/*"
                        style="display:none"
                        @change="uploadFreshInitAvatar($event.target.files); $event.target.value = ''"
                      >
                      <div class="chat-agent-avatar-actions chat-init-avatar-actions">
                        <button class="chat-agent-identity-pencil chat-agent-identity-pencil-avatar-action" @click.stop="toggleFreshInitEmojiPicker()" title="Pick emoji" aria-label="Pick emoji">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M8 15c1 .8 2.1 1.2 4 1.2s3-.4 4-1.2"></path><circle cx="9" cy="10" r="1"></circle><circle cx="15" cy="10" r="1"></circle></svg>
                        </button>
                        <button class="chat-agent-identity-pencil chat-agent-identity-pencil-avatar-action" @click.stop="openFreshInitAvatarPicker()" :disabled="freshInitAvatarUploading" title="Upload avatar" aria-label="Upload avatar">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5-5 5 5"></path><path d="M12 5v12"></path></svg>
                        </button>
