<body x-data="app" :data-theme="theme">

<!-- Startup splash -->
<infring-boot-splash-shell></infring-boot-splash-shell>

<!-- Auth Prompt (API Key or Username/Password) -->
<infring-auth-prompt-shell></infring-auth-prompt-shell>

<div class="app-layout" :class="{ 'focus-mode': $store.app.focusMode, 'taskbar-bottom': taskbarDockEdge === 'bottom' }">
  <!-- Sidebar -->
  <infring-sidebar-rail-shell class="sidebar drag-bar overlay-shared-surface" dragbarsurface="chat-sidebar" parentownedmechanics="true">
    <div class="sidebar-nav-shell">
    <div class="sidebar-nav" role="navigation" aria-label="Main navigation" x-ref="sidebarNav">
      <div class="sidebar-top-ghost" aria-hidden="true"></div>
      <!-- Agents conversations — primary action -->
      <div class="nav-section" aria-label="Agent conversations">
          <div>
            <infring-sidebar-nav-link-shell label="Conversations" route="chat" activeroutes="chat" icon="chat"></infring-sidebar-nav-link-shell>
            <infring-sidebar-conversation-search-shell></infring-sidebar-conversation-search-shell>
            <div class="nav-sub-item-controls">
              <infring-sidebar-sort-toggle-shell></infring-sidebar-sort-toggle-shell>
              <infring-sidebar-new-agent-action-shell variant="expanded"></infring-sidebar-new-agent-action-shell>
            </div>
            <infring-sidebar-new-agent-action-shell variant="collapsed"></infring-sidebar-new-agent-action-shell>
            <infring-sidebar-virtual-spacer-shell edge="top"></infring-sidebar-virtual-spacer-shell>
            <infring-sidebar-agent-list-shell></infring-sidebar-agent-list-shell>
            <infring-sidebar-virtual-spacer-shell edge="bottom"></infring-sidebar-virtual-spacer-shell>
            <infring-sidebar-agent-empty-state-shell></infring-sidebar-agent-empty-state-shell>
            <infring-sidebar-nav-link-shell label="Agents" route="agents" activeroutes="agents,sessions,approvals" icon="agents"></infring-sidebar-nav-link-shell>
          </div>
      </div>

      <!-- Automation -->
      <div class="nav-section sidebar-tab-section" aria-label="Automation">
          <div>
            <infring-sidebar-nav-link-shell label="Automation" route="scheduler" activeroutes="scheduler,workflows" icon="automation"></infring-sidebar-nav-link-shell>
          </div>
      </div>

      <!-- Apps -->
      <div class="nav-section sidebar-tab-section" aria-label="Apps">
          <div>
            <infring-sidebar-nav-link-shell label="Apps" route="skills" activeroutes="channels,eyes,skills,hands" icon="apps"></infring-sidebar-nav-link-shell>
          </div>
      </div>

      <!-- System -->
      <div class="nav-section sidebar-tab-section" aria-label="System">
          <div>
            <infring-sidebar-nav-link-shell label="System" route="runtime" activeroutes="runtime,analytics,logs" icon="system" popup="hide"></infring-sidebar-nav-link-shell>
          </div>
      </div>
    </div>
      <infring-sidebar-scroll-controls-shell></infring-sidebar-scroll-controls-shell>
    </div>
