                    <template x-if="terminalMode">
                      <button class="btn-send btn-send-terminal" @click="sendMessage()" :disabled="showFreshArchetypeTiles ? (!freshInitAwaitingOtherPrompt || !inputText.trim()) : !inputText.trim()" title="Run command">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                      </button>
                    </template>
                    <template x-if="!terminalMode">
                      <div class="toggle-pill toggle-pill--triple input-toggle-wrapper" :data-mode="currentInputToggleMode()" role="group" aria-label="Voice and send controls">
                        <button
                          type="button"
                          class="composer-send-voice-opt composer-send-voice-opt-attach"
                          @click="beginAttachPickerSession()"
                          title="Add files"
                          aria-label="Add files"
                        >
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                        </button>
                        <button
                          type="button"
                          class="composer-send-voice-opt composer-send-voice-opt-voice"
                          :class="{ active: recording, 'btn-recording': recording }"
                          @click="if(recording){stopRecording()}else{startRecording()}"
                          title="Toggle voice recording"
                          aria-label="Toggle voice recording"
                        >
                          <svg x-show="!recording" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                          <span x-show="recording" class="recording-dot"></span>
                        </button>
                        <template x-if="!sending">
                          <button
                            type="button"
                            class="composer-send-voice-opt composer-send-voice-opt-send"
                            :class="{ active: !recording }"
                            @click="sendMessage()"
                            :disabled="showFreshArchetypeTiles ? (!freshInitAwaitingOtherPrompt || !inputText.trim()) : (!inputText.trim() && !attachments.length)"
                            title="Send"
                            aria-label="Send message"
                          >
                            <svg x-show="recording || currentInputToggleMode() === 'attach'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            <svg x-show="!recording && currentInputToggleMode() !== 'attach'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                          </button>
                        </template>
                        <template x-if="sending">
                          <button
                            type="button"
                            class="composer-send-voice-opt composer-send-voice-opt-stop active"
                            @click="stopAgent()"
                            title="Stop generating"
                            aria-label="Stop generating"
                          >
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                          </button>
                        </template>
                      </div>
                    </template>
                  </div>
                </div>
                </div>
              </div>
              <div class="system-thread-placeholder-row" x-show="isSystemThreadActive()" aria-hidden="true"></div>
              <!-- Footer: model switcher + tokens + queue + tips -->
              <div class="input-footer">
                <div class="flex items-center gap-2">
                  <span class="text-xs text-dim" x-text="terminalMode ? ('terminal mode (' + terminalShortcutHint + ')') : (tokenCount > 0 ? '~' + tokenCount + ' tokens' : (attachments.length ? attachments.length + ' file(s)' : ''))"></span>
                </div>
                <div class="input-footer-right">
                  <div class="tip-bar" x-show="currentTip && !sending && !terminalMode">
                    <span class="text-xs" x-text="currentTip"></span>
                    <button class="tip-bar-dismiss" @click="dismissTips()" title="Dismiss">&times;</button>
                  </div>
                </div>
              </div>
              <div class="chat-archived-banner chat-archived-banner-bottom-center" x-show="currentAgent && isCurrentAgentArchived && isCurrentAgentArchived()">
                <button type="button" class="btn btn-primary btn-sm" @click="reviveCurrentArchivedAgent()">Revive Agent</button>
              </div>
              </div>
            </div>
          </div>
        </template>

        <!-- MODE 2: Agent picker + Templates (no agent chatting) -->
        <div x-show="!activeChatAgent" class="chat-wrapper">
        <div class="page-header">
          <div class="tabs mt-3" role="tablist">
            <div class="tab" role="tab" :class="{ active: page === 'agents' }" @click="navigate('agents')">Agents</div>
            <div class="tab" role="tab" :class="{ active: page === 'sessions' }" @click="navigate('sessions')">Sessions</div>
            <div class="tab" role="tab" :class="{ active: page === 'approvals' }" @click="navigate('approvals')">Approvals</div>
          </div>
        </div>
        <div class="page-body" style="overflow-y:auto;padding:24px">
          <div x-show="$store.app.agentsLoading || !$store.app.agentsHydrated" class="loading-state" style="padding:72px 24px">
            <div class="spinner"></div>
            <span>Loading agents...</span>
          </div>
          <div x-show="!($store.app.agentsLoading || !$store.app.agentsHydrated)">

          <!-- Running agents — click to chat -->
          <div style="margin-bottom:28px">
            <div class="flex justify-between items-center mb-2" style="gap:10px">
              <div class="text-sm font-bold" style="color:var(--text-dim);letter-spacing:0.5px;font-size:11px;text-transform:uppercase">Your Agents</div>
              <button
                class="btn btn-ghost btn-archive-all btn-sm"
                @click="archiveAllAgents()"
              >
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="3" y="4" width="18" height="5" rx="1"></rect>
                  <path d="M5 9h14v10a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2z"></path>
                  <path d="M10 13h4"></path>
                </svg>
                Archive all
              </button>
            </div>
            <div class="agent-chip-grid" style="display:flex;flex-wrap:wrap;gap:10px">
              <button
                class="card agent-chip new-agent-chip agent-chip-square"
                type="button"
                @click="createSidebarAgentChat()"
                :disabled="sidebarSpawningAgent"
                :class="{ 'is-loading': sidebarSpawningAgent }"
                style="cursor:pointer"
                title="Create a new agent and open initialization chat">
                <div class="new-agent-chip-icon" style="width:36px;height:36px;border-radius:50%;background:color-mix(in srgb, var(--accent-subtle) 85%, transparent);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid color-mix(in srgb, var(--accent) 34%, transparent);color:var(--accent)">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" :style="sidebarSpawningAgent ? 'opacity:0.45' : ''">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                  </svg>
                  <span class="spinner-sm new-agent-plus-spinner" x-show="sidebarSpawningAgent" aria-hidden="true"></span>
                </div>
                <div style="min-width:0;flex:1;text-align:left">
                  <div class="font-bold" style="font-size:13px;color:var(--text)" x-text="sidebarSpawningAgent ? 'Creating Agent…' : 'Create New Agent'"></div>
                  <div class="text-xs text-dim font-mono" style="font-size:11px" x-text="sidebarSpawningAgent ? 'Opening init chat…' : 'Open init chat'"></div>
                </div>
              </button>
              <template x-for="agent in agents" :key="agent.id">
                <div class="card agent-chip agent-chip-square agent-chip-square-active" @click="chatWithAgent(agent)" style="cursor:pointer">
                  <div style="width:36px;height:36px;border-radius:50%;background:var(--accent-subtle);display:flex;align-items:center;justify-content:center;flex-shrink:0">
                    <img
                      x-show="agent.avatar_url"
                      :src="agent.avatar_url || ''"
                      :alt="(agent.name || agent.id || 'agent') + ' avatar'"
                      style="width:100%;height:100%;border-radius:50%;object-fit:cover"
                      loading="lazy"
                    >
                    <span x-show="!agent.avatar_url && agent.identity && agent.identity.emoji" x-text="agent.identity && agent.identity.emoji" style="font-size:18px"></span>
                    <span class="infring-logo infring-logo--agent-default" x-show="!agent.avatar_url && (!agent.identity || !agent.identity.emoji)" aria-hidden="true"><span class="infring-logo-glyph" aria-hidden="true">&infin;</span></span>
                  </div>
                  <div style="min-width:0;flex:1;text-align:center;width:100%">
                    <div class="font-bold" style="font-size:13px" x-text="agent.name"></div>
                    <div class="text-xs text-dim font-mono" style="font-size:11px" x-text="agent.model_name"></div>
                    <div
                      class="text-xs text-dim font-mono"
                      style="font-size:10px"
                      x-show="formatAgentContractLine(agent)"
                      x-text="formatAgentContractLine(agent)">
                    </div>
                  </div>
                  <span class="badge" :class="'badge-' + agent.state.toLowerCase()" x-text="agent.state" style="font-size:10px"></span>
                </div>
              </template>
            </div>
          </div>

          <div
            x-show="agentLifecycle && agentLifecycle.idle_alert"
            style="margin-bottom:20px;padding:10px 12px;border:1px solid rgba(255,179,71,0.45);background:rgba(255,179,71,0.12);border-radius:10px">
            <div class="text-xs font-bold" style="letter-spacing:0.4px;text-transform:uppercase;color:#ffcf8a">Idle Agent Alert</div>
            <div class="text-sm" style="margin-top:4px;color:var(--text)" x-text="idleAgentAlertText"></div>
          </div>

          <div style="margin-bottom:24px">
            <div class="flex justify-between items-center mb-2" style="gap:10px">
              <div class="text-sm font-bold" style="color:var(--text-dim);letter-spacing:0.5px;font-size:11px;text-transform:uppercase">
                Archived
              </div>
              <button
                class="btn btn-danger btn-sm"
                x-show="terminatedAgents.length"
                @click="deleteAllArchived()"
              >
                Delete all
              </button>
