                        <button class="chat-agent-identity-pencil chat-agent-identity-pencil-avatar-action" x-show="freshInitAvatarUrl" @click.stop="clearFreshInitAvatar()" :disabled="freshInitLaunching" title="Use emoji instead" aria-label="Use emoji instead">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
                        </button>
                        <div class="chat-agent-emoji-menu" x-show="freshInitEmojiPickerOpen" x-transition.opacity>
                          <input class="form-input chat-agent-emoji-search" x-model="freshInitEmojiSearch" :disabled="freshInitLaunching" placeholder="Search emoji...">
                          <div class="chat-agent-emoji-grid">
                            <template x-for="item in filteredFreshInitEmojiCatalog()" :key="'fresh-init-emoji-' + item.emoji + '-' + item.name">
                              <button class="emoji-grid-item" @click.stop="selectFreshInitEmoji(item)" :disabled="freshInitLaunching" :title="item.name" x-text="item.emoji"></button>
                            </template>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div class="chat-init-name-row" data-init-anchor="identity-name">
                    <input class="form-input chat-init-name-input" x-model="freshInitName" :disabled="freshInitLaunching" maxlength="100" placeholder="Agent name (optional)" title="Agent name">
                  </div>
                  <div class="text-xs text-dim" x-show="freshInitAvatarUploading">Uploading avatar...</div>
                  <div class="text-xs text-danger" x-show="freshInitAvatarUploadError" x-text="freshInitAvatarUploadError"></div>

                  <div class="chat-init-section-title" data-init-anchor="role">Role <span class="chat-init-section-required">required</span></div>
                  <div class="chat-archetype-grid chat-init-grid">
                    <template x-for="t in chatArchetypeTemplates" :key="'chat-arch-' + t.name">
                      <button class="chat-archetype-tile" :class="{ selected: isFreshInitTemplateSelected(t) }" :disabled="freshInitLaunching" @click="applyChatArchetypeTemplate(t)">
                        <span class="chat-archetype-tile-head">
                          <span class="chat-archetype-name" x-text="t.name"></span>
                          <span class="badge badge-dim" x-text="t.category"></span>
                        </span>
                        <span class="chat-archetype-desc" x-text="freshInitTemplateDescription(t)"></span>
                      </button>
                    </template>
                  </div>
                  <div class="chat-archetype-subtitle chat-init-other-note" x-show="freshInitTemplateDef && freshInitTemplateDef.is_other && freshInitAwaitingOtherPrompt" x-text="freshInitOtherInputPlaceholder()"></div>

                  <div class="chat-init-section-title" data-init-anchor="lifespan">Lifespan <span class="chat-init-section-required">required</span></div>
                  <div class="chat-archetype-grid chat-init-grid chat-init-lifespan-grid">
                    <template x-for="l in freshInitLifespanCards" :key="'chat-lifespan-' + l.id">
                      <button class="chat-archetype-tile" :class="{ selected: isFreshInitLifespanSelected(l) }" :disabled="freshInitLaunching" @click="selectFreshInitLifespan(l)">
                        <span class="chat-archetype-tile-head">
                          <span class="chat-archetype-name" x-text="l.name"></span>
                        </span>
                        <span class="chat-archetype-desc" x-text="l.description"></span>
                      </button>
                    </template>
                  </div>

                  <button class="chat-init-advanced-toggle" type="button" :disabled="freshInitLaunching" @click="toggleFreshInitAdvanced()">
                    <span class="chat-init-advanced-title">Advanced setup <span class="chat-init-section-optional">Optional</span></span>
                    <span class="chat-init-advanced-chevron" :class="{ open: freshInitAdvancedOpen }" aria-hidden="true">▾</span>
                  </button>

                  <div class="chat-init-advanced-panel" x-show="freshInitAdvancedOpen" x-transition.opacity>
                    <div class="chat-init-section-title">LLM <span class="chat-init-section-optional">Optional</span></div>
                    <div class="chat-init-model-loading-row" x-show="freshInitModelSuggestLoading">
                      <span class="spinner inline"></span>
                      <span>Ranking top models for selected role...</span>
                    </div>
                    <div class="chat-archetype-grid chat-init-grid chat-init-model-grid" x-show="!freshInitModelSuggestLoading">
                      <template x-for="(m, idx) in freshInitModelSuggestions" :key="'chat-init-model-' + normalizeFreshInitModelRef(m)">
                        <button class="chat-archetype-tile chat-init-model-tile" :class="{ selected: isFreshInitModelSuggestionSelected(m) }" :disabled="freshInitLaunching" @click="selectFreshInitModelSuggestion(m)">
                          <span class="chat-archetype-tile-head">
                            <span class="chat-archetype-name"><span class="chat-init-model-rank" x-text="'#' + (idx + 1)"></span> <span x-text="freshInitModelName(m)"></span></span>
                            <span class="badge badge-dim" x-text="String(m.provider || 'model').toUpperCase()"></span>
                          </span>
                          <span class="chat-archetype-desc" x-text="modelDeploymentLabel(m)"></span>
                          <span class="chat-init-model-meta">
                            <span x-text="modelContextWindowLabel(m)"></span>
                            <span>•</span>
                            <span x-text="modelParamLabel(m)"></span>
                            <span>•</span>
                            <span x-text="modelPowerIcons(m)"></span>
                            <span>/</span>
                            <span x-text="modelCostIcons(m)"></span>
                          </span>
                        </button>
                      </template>
                      <div class="chat-init-model-empty" x-show="!freshInitModelSuggestions || freshInitModelSuggestions.length === 0">
                        Model suggestions will appear after role selection.
                      </div>
                    </div>

                    <div class="chat-init-section-title">Vibe <span class="chat-init-section-optional">Optional</span></div>
                    <div class="chat-archetype-grid chat-init-grid chat-init-vibe-grid">
                      <template x-for="v in freshInitVibeCards" :key="'chat-vibe-' + v.id">
                        <button class="chat-archetype-tile" :class="{ selected: isFreshInitVibeSelected(v) }" :disabled="freshInitLaunching" @click="selectFreshInitVibe(v)">
                          <span class="chat-archetype-tile-head">
                            <span class="chat-archetype-name" x-text="v.name"></span>
                          </span>
                          <span class="chat-archetype-desc" x-text="v.description"></span>
                        </button>
                      </template>
                    </div>

                    <div class="chat-init-section-title">Personality <span class="chat-init-section-optional">Optional</span></div>
                    <div class="chat-archetype-grid chat-init-grid chat-init-personality-grid">
                      <template x-for="p in freshInitPersonalityCards" :key="'chat-personality-' + p.id">
                        <button class="chat-archetype-tile" :class="{ selected: isFreshInitPersonalitySelected(p) }" :disabled="freshInitLaunching" @click="selectFreshInitPersonality(p)">
                          <span class="chat-archetype-tile-head">
                            <span class="chat-archetype-name" x-text="p.name"></span>
                          </span>
                          <span class="chat-archetype-desc" x-text="p.description"></span>
                        </button>
                      </template>
                    </div>

                    <div class="chat-init-section-title">Permissions <span class="chat-init-section-optional">Optional</span></div>
                    <div class="chat-init-permissions-panel">
                      <template x-for="section in freshInitPermissionCatalog" :key="'chat-permissions-' + section.category">
                        <div class="chat-init-permissions-category">
                          <div class="chat-init-permissions-category-head">
                            <span class="chat-archetype-name" x-text="section.name"></span>
                            <div class="chat-init-permissions-category-actions">
                              <button class="btn btn-ghost btn-xs" type="button" :disabled="freshInitLaunching" @click="setFreshInitPermissionCategory(section.category, true)">Allow all</button>
                              <button class="btn btn-ghost btn-xs" type="button" :disabled="freshInitLaunching" @click="setFreshInitPermissionCategory(section.category, false)">Inherit all</button>
                            </div>
                          </div>
                          <div class="chat-init-permissions-list">
                            <template x-for="p in section.permissions" :key="'chat-permission-' + p.key">
                              <label class="chat-init-permissions-item">
                                <input type="checkbox" :disabled="freshInitLaunching" :checked="isFreshInitPermissionChecked(p)" @change="setFreshInitPermissionChecked(p, $event.target.checked)">
                                <span x-text="p.label"></span>
                              </label>
                            </template>
                          </div>
                        </div>
                      </template>
                    </div>
                  </div>

                  <div class="chat-init-launch-row" data-init-anchor="launch">
                    <button class="btn btn-primary chat-init-launch-btn" :class="{ 'chat-init-launch-pulse': freshInitCanLaunch && !freshInitLaunching }" @click="launchFreshAgentInitialization()" :disabled="freshInitLaunching || !freshInitCanLaunch">
                      <span x-show="!freshInitLaunching">Launch</span>
                      <span x-show="freshInitLaunching">Launching...</span>
                    </button>
                  </div>
                </div>
              </div>
            </template>
          <div x-show="dragOver" style="position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:var(--surface);opacity:0.92;border:2px dashed var(--accent);border-radius:8px;pointer-events:none">
            <span style="font-size:16px;color:var(--accent);font-weight:600">Drop files here</span>
          </div>
        </div>
        <infring-chat-map-shell class="chat-map" dragbarsurface="chat-map" parentownedmechanics="true" x-show="currentAgent && messages && messages.length > 0" :style="chatMapContainerStyle()" :hasmessages="!!(currentAgent && messages && messages.length > 0)" :dragging="!!chatMapDragActive" aria-label="Message map"></infring-chat-map-shell>
        <infring-chat-input-footer-shell></infring-chat-input-footer-shell>
