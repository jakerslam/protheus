                          </div>
                        </template>

                        <!-- Timestamp + meta row -->
                        <infring-message-meta-shell

                    <button class="btn btn-ghost btn-sm" type="button" @click="expandDisplayedMessages()">Expand</button>
                  </div>
                </div>

              </template>
              <infring-chat-empty-state-shell>
              <template x-if="currentAgent && !sessionLoading && (!filteredMessages || filteredMessages.length === 0) && !showFreshArchetypeTiles">

                    <button class="btn btn-ghost btn-sm" @click="if (searchQuery && searchQuery.trim()) { searchQuery = ''; } else { ensureFreshInitThread(currentAgent); }" x-text="searchQuery && searchQuery.trim() ? 'Clear search' : 'Initialize agent'"></button>
                    <button class="btn btn-primary btn-sm" @click="focusChatComposerFromInit('')" x-show="!(searchQuery && searchQuery.trim())">Start chat</button>

                <span style="font-size:16px;color:var(--accent);font-weight:600">Drop files here</span>
              </infring-chat-stream-shell>
              </infring-dropzone-overlay-shell>
              <infring-workspace-panel-shell>

                  <div>
                    <div class="chat-workspace-panel-title">Workspace</div>
                    <div class="chat-workspace-panel-subtitle" x-text="workspacePanelPayload() ? (workspacePanelPayload().actor + (workspacePanelPayload().timestamp ? (' · ' + workspacePanelPayload().timestamp) : '')) : ''"></div>
                  </div>
                  <button type="button" class="message-stat-btn" @click="closeWorkspacePanel()" title="Close workspace">✕</button>
                </div>
                <div class="chat-workspace-panel-body" x-show="workspacePanelPayload()">
                  <div class="chat-workspace-panel-section" x-show="workspacePanelPayload() && workspacePanelPayload().preview">
                    <div class="chat-workspace-panel-label">Summary</div>
                    <div class="chat-workspace-panel-text" x-text="workspacePanelPayload().preview"></div>
                  </div>
                  <div class="chat-workspace-panel-section" x-show="workspacePanelPayload() && workspacePanelPayload().sources && workspacePanelPayload().sources.length">
                    <div class="chat-workspace-panel-label">Sources</div>

                      <template x-for="chip in (workspacePanelPayload().sources || [])" :key="'workspace-source-' + chip.id">
                        <a class="chat-workspace-source" :href="chip.url" target="_blank" rel="noopener"><span x-text="chip.label"></span><span class="chat-workspace-source-host" x-show="chip.host" x-text="chip.host"></span></a>
                      </template>
                    </div>
                  </div>
                  <div class="chat-workspace-panel-section" x-show="workspacePanelPayload() && workspacePanelPayload().trace && workspacePanelPayload().trace.length">
                    <div class="chat-workspace-panel-label">Tool trace</div>
                    <div class="chat-workspace-panel-list">
                      <template x-for="row in (workspacePanelPayload().trace || [])" :key="'workspace-trace-' + row.id">
                        <div class="chat-workspace-trace-row"><span class="chat-workspace-trace-name" x-text="row.label"></span><span class="chat-workspace-trace-state" :class="'state-' + row.state" x-text="row.state"></span></div>
                      </template>
                    </div>
                  </div>
                  <div class="chat-workspace-panel-section" x-show="workspacePanelPayload() && workspacePanelPayload().artifacts && workspacePanelPayload().artifacts.length">
                    <div class="chat-workspace-panel-label">Artifacts</div>
                    <div class="chat-workspace-panel-list">
                      <template x-for="artifact in (workspacePanelPayload().artifacts || [])" :key="'workspace-artifact-' + artifact.id">
                        <div class="chat-workspace-artifact-row"><span class="chat-workspace-artifact-type" x-text="artifact.type"></span><span class="chat-workspace-artifact-label" x-text="artifact.label"></span><span class="chat-workspace-artifact-detail" x-show="artifact.detail" x-text="artifact.detail"></span></div>
                      </template>
                    </div>
                  </div>
                </div>

              </infring-workspace-panel-shell>

              <div class="chat-map-surface drag-bar overlay-shared-surface" :class="{ 'is-container-dragging': !!chatMapDragActive }" @pointerdown.capture="startChatMapPointerDrag($event)" @mousedown.capture="startChatMapPointerDrag($event)">

                    <button class="chat-map-day" type="button" @click="toggleMessageDayCollapse(msg)" @mouseenter="showMapDayPopup(msg, $event)" @mousemove="showMapDayPopup(msg, $event)" @focus="showMapDayPopup(msg, $event)" @mouseleave="hideMapDayPopup()" @blur="hideMapDayPopup()" :aria-label="'Messages for ' + messageDayLabel(msg)">
                      <span class="chat-map-day-chevron" x-text="isMessageDayCollapsed(msg) ? '▸' : '▾'" aria-hidden="true"></span>
                      <span class="chat-map-day-icon" aria-hidden="true">&#9728;</span>
                    </button>
                  </template>
                  <button x-show="!isMessageDayCollapsed(msg)" class="chat-map-item" :data-msg-dom-id="messageDomId(msg, idx)" :class="['role-' + (msg.role || 'agent'), isLongMessagePreview(msg) ? 'long-message' : '', isSelectedMessage(msg, idx) ? 'selected-linked' : '', isHoveredMessage(msg, idx) ? 'hover-linked' : '', (isFirstInSourceRun(idx, filteredMessages) && !isLastInSourceRun(idx, filteredMessages)) ? 'map-stack-top' : '', (!isFirstInSourceRun(idx, filteredMessages) && !isLastInSourceRun(idx, filteredMessages)) ? 'map-stack-middle' : '', (isLastInSourceRun(idx, filteredMessages) && !isFirstInSourceRun(idx, filteredMessages)) ? 'map-stack-bottom' : '']" @mouseenter="showMapItemPopup(msg, idx, $event)" @mousemove="showMapItemPopup(msg, idx, $event)" @focus="showMapItemPopup(msg, idx, $event)" @mouseleave="hideMapItemPopup()" @blur="hideMapItemPopup()" @click="jumpToMessage(msg, idx)" :aria-label="'Jump to message ' + (idx + 1)">
                    <span class="chat-map-item-main" x-show="messageMapMarkerType(msg) === ''">
                      <span class="chat-map-bar"></span>
                    </span>
                    <span class="chat-map-tool-row" x-show="messageMapMarkerType(msg) === 'model'">
                      <span class="chat-map-marker chat-map-marker-model" x-show="messageMapMarkerType(msg) === 'model'" :title="messageMapMarkerTitle(msg)" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                      </span>
                    </span>
                    <span class="chat-map-tool-row" x-show="messageMapMarkerType(msg) === 'info'">
                      <span class="chat-map-marker chat-map-marker-info" :title="messageMapMarkerTitle(msg)" aria-hidden="true">
                        <span class="chat-event-info-icon chat-map-info-icon" x-text="msg.notice_icon || 'i'"></span>
                      </span>
                    </span>
                    <span class="chat-map-tool-row" x-show="messageMapMarkerType(msg) === 'tool'">
                      <span class="chat-map-marker chat-map-marker-tool" :class="'state-' + (messageMapToolOutcome(msg) || 'success')" :title="messageMapMarkerTitle(msg)" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                      </span>
                    </span>
                    <span class="chat-map-tool-row" x-show="messageMapMarkerType(msg) === 'terminal'">
                      <span class="chat-map-marker chat-map-marker-terminal" :title="messageMapMarkerTitle(msg)" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><path d="M4 17 10 11 4 5"/><path d="M12 19h8"/></svg>
                      </span>
                    </span>
                  </button>
                </div>
              </template>
              <div class="chat-map-spacer" aria-hidden="true"></div>
              </div>
              </div>
              </infring-chat-map-viewport-shell>
              </div>
              <button class="chat-map-jump chat-map-jump-down" type="button" @click="stepMessageMap(filteredMessages, 1)" title="Next message" aria-label="Next message">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"></path></svg>
              </button>
              </div>
              </infring-chat-map-rail-shell>
              </div>
            </infring-chat-map-shell>
            <!-- Input area -->
            <infring-chat-input-footer-shell>
            <div class="input-area" x-show="currentAgent && !(isCurrentAgentArchived && isCurrentAgentArchived())" style="position:relative" :class="{ 'terminal-mode': terminalMode }">

              <div class="chat-input-lane">
              <button class="chat-scroll-down" x-show="showScrollDown && currentAgent" @click="scrollToBottom({ buttonAnimated: true, force: true })" title="Scroll to latest" aria-label="Scroll to latest">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"></path></svg>
              </button>

              <div x-show="!terminalMode && attachments.length > 0" style="display:flex;gap:8px;flex-wrap:wrap;padding:0 0 8px 0">
                <template x-for="(att, aidx) in attachments" :key="aidx">
                  <div style="position:relative;border:1px solid var(--border);border-radius:6px;padding:4px;display:flex;align-items:center;gap:6px;background:var(--surface2);max-width:180px">
