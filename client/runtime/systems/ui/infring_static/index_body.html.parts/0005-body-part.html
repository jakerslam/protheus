                <button class="btn btn-ghost btn-sm" @click="toggleSearch()" title="Search messages (Ctrl+G)">

                      </template>
                    </div>
                  </div>
                </div>
              </infring-popup-window-shell>
              </infring-workspace-panel-shell>

            </infring-messages-surface-shell>
            <infring-chat-map-shell class="chat-map" x-show="currentAgent && filteredMessages && filteredMessages.length > 0" :style="chatMapContainerStyle()" :hasmessages="!!(currentAgent && filteredMessages && filteredMessages.length > 0)" :dragging="!!chatMapDragActive" aria-label="Message map">
              <div class="chat-map-surface drag-bar overlay-shared-surface" :class="{ 'is-container-dragging': !!chatMapDragActive }" @pointerdown.capture="startChatMapPointerDrag($event)" @mousedown.capture="startChatMapPointerDrag($event)">

                  <button x-show="!isMessageDayCollapsed(msg)" class="chat-map-item" :data-msg-dom-id="messageDomId(msg, idx)" :class="['role-' + (msg.role || 'agent'), isLongMessagePreview(msg) ? 'long-message' : '', isSelectedMessage(msg, idx) ? 'selected-linked' : '', isHoveredMessage(msg, idx) ? 'hover-linked' : '', (isFirstInSourceRun(idx, filteredMessages) && !isLastInSourceRun(idx, filteredMessages)) ? 'map-stack-top' : '', (!isFirstInSourceRun(idx, filteredMessages) && !isLastInSourceRun(idx, filteredMessages)) ? 'map-stack-middle' : '', (isLastInSourceRun(idx, filteredMessages) && !isFirstInSourceRun(idx, filteredMessages)) ? 'map-stack-bottom' : '']" @mouseenter="showMapItemPopup(msg, idx, $event)" @mousemove="showMapItemPopup(msg, idx, $event)" @focus="showMapItemPopup(msg, idx, $event)" @mouseleave="hideMapItemPopup()" @blur="hideMapItemPopup()" @click="jumpToMessage(msg, idx)" :aria-label="'Jump to message ' + (idx + 1)">
                    <span class="chat-map-item-main" x-show="messageMapMarkerType(msg) === ''">
                      <span class="chat-map-bar"></span>

                        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                      </span>
                    </span>

                        <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>

                      </span>
