        <div class="global-taskbar-page-slot"></div>
      </div>
      <div class="global-taskbar-right">
        <div
          class="taskbar-reorder-box taskbar-reorder-box-right"
          @pointerdown="handleTaskbarReorderPointerDown('right', $event)"
          @pointerup="cancelTaskbarDragHold()"
          @pointercancel="cancelTaskbarDragHold()"
          @pointerleave="cancelTaskbarDragHold()"
          @dragstart="handleTaskbarReorderDragStart('right', $event)"
          @drag="handleTaskbarReorderDragMove($event)"
          @dragenter="handleTaskbarReorderDragEnter('right', $event)"
          @dragover="handleTaskbarReorderDragOver('right', $event)"
          @drop="handleTaskbarReorderDrop('right', $event)"
          @dragend="handleTaskbarDragEnd()"
        >
          <div class="taskbar-reorder-item" data-taskbar-item="connectivity" :style="taskbarReorderItemStyle('right', 'connectivity')" draggable="true">
            <div class="global-taskbar-controls">
              <button
                class="health-indicator taskbar-agent-indicator"
                type="button"
                :class="runtimeFacadeClass()"
                @click="location.hash='agents'"
                :title="runtimeFacadeTitle()"
                aria-label="Open agents"
              >
                <span class="taskbar-agent-indicator-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                  </svg>
                </span>
                <span class="taskbar-agent-indicator-text" x-text="runtimeFacadeDisplayLabel()"></span>
              </button>
            </div>
          </div>
          <div class="taskbar-reorder-item" data-taskbar-item="theme" :style="taskbarReorderItemStyle('right', 'theme')" draggable="true">
            <div class="theme-switcher toggle-pill" :data-mode="themeMode" :data-resolved="theme">
              <button class="theme-opt" :class="{ active: themeMode === 'light' }" @click="setTheme('light')" title="Light" aria-label="Light theme">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="12" cy="12" r="4"></circle>
                  <path d="M12 2v2"></path>
                  <path d="M12 20v2"></path>
                  <path d="m4.93 4.93 1.41 1.41"></path>
                  <path d="m17.66 17.66 1.41 1.41"></path>
                  <path d="M2 12h2"></path>
                  <path d="M20 12h2"></path>
                  <path d="m6.34 17.66-1.41 1.41"></path>
                  <path d="m19.07 4.93-1.41 1.41"></path>
                </svg>
              </button>
              <button class="theme-opt" :class="{ active: themeMode === 'system' }" @click="setTheme('system')" title="System" aria-label="System theme">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="2" y="3" width="20" height="14" rx="2"></rect>
                  <path d="M8 21h8"></path><path d="M12 17v4"></path>
                </svg>
              </button>
              <button class="theme-opt" :class="{ active: themeMode === 'dark' }" @click="setTheme('dark')" title="Dark" aria-label="Dark theme">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3c0 0 0 0 0 0A7 7 0 0 0 21 12.79z"></path>
                </svg>
              </button>
            </div>
          </div>
          <div class="taskbar-reorder-item" data-taskbar-item="notifications" :style="taskbarReorderItemStyle('right', 'notifications')" draggable="true">
            <div class="notif-wrap" x-ref="taskbarNotifAnchor" @click.outside="$store.app.notificationsOpen = false">
              <button class="btn btn-ghost btn-sm taskbar-icon-btn notif-btn" :class="{ 'notif-btn-auto-ring': $store.app.notificationBellPulse }" @click="$store.app.toggleNotifications()" title="Notifications" aria-label="Notifications">
                <svg class="notif-bell-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"></path>
                  <path d="M9 17a3 3 0 0 0 6 0"></path>
                </svg>
                <span class="notif-badge" x-show="$store.app.unreadNotifications > 0" x-text="$store.app.unreadNotifications > 99 ? '99+' : $store.app.unreadNotifications"></span>
              </button>
              <infring-taskbar-menu-shell class="notif-dropdown dashboard-dropdown-surface" :class="taskbarAnchoredDropdownClass($refs.taskbarNotifAnchor, 'bottom')" x-show="$store.app.notificationsOpen" x-transition:enter="transition ease-out duration-120" x-transition:enter-start="opacity-0 transform translate-y-1" x-transition:enter-end="opacity-100 transform translate-y-0">
                <div class="notif-dropdown-head dashboard-dropdown-header">
                  <span>Notifications</span>
                  <button class="notif-clear-btn" @click="$store.app.clearNotifications()">Clear</button>
                </div>
                <template x-if="!$store.app.notifications.length">
                  <div class="notif-empty">No notifications yet</div>
                </template>
                <div class="notif-list" x-show="$store.app.notifications.length">
                  <template x-for="note in $store.app.notifications" :key="note.id">
                    <div class="notif-item" :class="{ unread: !note.read }">
                      <button class="notif-item-open" @click="$store.app.reopenNotification(note)">
                        <span class="notif-item-dot" :class="'type-' + note.type"></span>
                        <span class="notif-item-msg" x-text="note.message"></span>
                        <span class="notif-item-time" x-text="$store.app.formatNotificationTime(note.ts)"></span>
                      </button>
                      <button
                        class="notif-item-dismiss"
                        @click.stop="$store.app.dismissNotification(note.id)"
                        title="Dismiss notification"
                        aria-label="Dismiss notification"
                      >&times;</button>
                    </div>
                  </template>
                </div>
              </infring-taskbar-menu-shell>
              <div class="notif-bubble" x-show="$store.app.notificationBubble" x-transition:enter="transition ease-out duration-160" x-transition:enter-start="opacity-0 transform translate-y-2" x-transition:enter-end="opacity-100 transform translate-y-0" x-transition:leave="transition ease-in duration-120" x-transition:leave-start="opacity-100 transform translate-y-0" x-transition:leave-end="opacity-0 transform translate-y-2">
                <div class="notif-bubble-head">
                  <span class="notif-item-dot" :class="'type-' + (($store.app.notificationBubble && $store.app.notificationBubble.type) || 'info')"></span>
                  <span class="notif-bubble-time" x-text="$store.app.notificationBubble ? $store.app.formatNotificationTime($store.app.notificationBubble.ts) : ''"></span>
                  <button class="notif-bubble-close" @click.stop="$store.app.dismissNotificationBubble()" aria-label="Dismiss notification">&times;</button>
                </div>
                <div class="notif-bubble-msg" x-text="$store.app.notificationBubble ? $store.app.notificationBubble.message : ''"></div>
              </div>
            </div>
          </div>
          <div class="taskbar-reorder-item" data-taskbar-item="search" :style="taskbarReorderItemStyle('right', 'search')" draggable="true">
            <button
              class="btn btn-ghost btn-sm taskbar-icon-btn taskbar-search-btn"
              type="button"
              @click.prevent.stop
              @mouseenter="showTaskbarUtilityPopup('Search', 'Search coming soon', $event)"
              @mousemove="showTaskbarUtilityPopup('Search', 'Search coming soon', $event)"
              @mouseleave="hideDashboardPopup('taskbar-utility:search')"
              @focus="showTaskbarUtilityPopup('Search', 'Search coming soon', $event)"
              @blur="hideDashboardPopup('taskbar-utility:search')"
              aria-label="Search"
              aria-disabled="true"
            >
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.05" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="6"></circle>
                <path d="m20 20-3.7-3.7"></path>
              </svg>
            </button>
          </div>
          <div class="taskbar-reorder-item" data-taskbar-item="auth" :style="taskbarReorderItemStyle('right', 'auth')" draggable="true">
            <button
              class="btn btn-ghost btn-sm taskbar-icon-btn auth-key-btn"
              type="button"
              @click.prevent
              @mouseenter="showTaskbarUtilityPopup('Authentication', 'Auth coming soon', $event)"
              @mousemove="showTaskbarUtilityPopup('Authentication', 'Auth coming soon', $event)"
              @mouseleave="hideDashboardPopup('taskbar-utility:authentication')"
              @focus="showTaskbarUtilityPopup('Authentication', 'Auth coming soon', $event)"
              @blur="hideDashboardPopup('taskbar-utility:authentication')"
              aria-label="Authentication"
            >
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
                <circle cx="12" cy="16" r="1"></circle>
              </svg>
            </button>
          </div>
        </div>
        <div class="taskbar-clock" :title="taskbarClockLabel()" aria-label="System clock">
          <span class="taskbar-clock-main" x-text="taskbarClockMainLabel()"></span>
          <span class="taskbar-clock-meridiem" x-text="taskbarClockMeridiemLabel()"></span>
        </div>
      </div>
    </div>
    <div
      id="taskbar-search-popup"
      class="taskbar-search-popup-anchor"
      x-cloak
      x-show="false"
      x-transition:enter="transition ease-out duration-180"
      x-transition:enter-start="opacity-0 transform -translate-y-2"
      x-transition:enter-end="opacity-100 transform translate-y-0"
      x-transition:leave="transition ease-in duration-130"
      x-transition:leave-start="opacity-100 transform translate-y-0"
      x-transition:leave-end="opacity-0 transform -translate-y-2"
      @keydown.escape.window="$store.app.closeTaskbarSearch()"
    >
      <infring-popup-window-shell class="taskbar-search-popup dashboard-popup-surface dashboard-popup-surface--interactive" :class="{ 'is-active': !!$store.app.taskbarSearchOpen }" @click.outside="$store.app.closeTaskbarSearch()">
        <span class="taskbar-search-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.05" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="6"></circle>
            <path d="m20 20-3.7-3.7"></path>
          </svg>
        </span>
        <input
          id="taskbar-search-input"
          type="text"
          class="taskbar-search-input"
          x-model="$store.app.taskbarSearchQuery"
          placeholder="Search conversations..."
          autocomplete="off"
          spellcheck="false"
          aria-label="Search"
        />
      </infring-popup-window-shell>
    </div>
    <infring-popup-window-shell
      class="popup-window popup-window-manual drag-bar"
      :class="{ 'is-container-dragging': popupWindowDragActive && popupWindowDragKind === 'manual' }"
      data-popup-window-kind="manual"
      kind="manual"
      :open="helpManualWindowOpen"
      :dragging="popupWindowDragActive && popupWindowDragKind === 'manual'"
      x-cloak
      x-show="helpManualWindowOpen"
      :style="popupWindowStyle('manual')"
      @keydown.escape.window="closePopupWindow('manual')"
      @pointerdown.capture="startPopupWindowPointerDrag('manual', $event)"
      @mousedown.capture="startPopupWindowPointerDrag('manual', $event)"
    >
      <div
        class="popup-window-header"
      >
        <button class="popup-window-close" type="button" @click="closePopupWindow('manual')" aria-label="Close Manual window">
          <span aria-hidden="true">×</span>
        </button>
        <h3 class="popup-window-title">Infring Manual</h3>
      </div>
      <div class="popup-window-body popup-window-body-markdown markdown-body" x-html="manualDocumentHtml()"></div>
    </infring-popup-window-shell>
    <infring-popup-window-shell
      class="popup-window popup-window-report drag-bar"
      :class="{ 'is-container-dragging': popupWindowDragActive && popupWindowDragKind === 'report' }"
      data-popup-window-kind="report"
      kind="report"
      :open="reportIssueWindowOpen"
      :dragging="popupWindowDragActive && popupWindowDragKind === 'report'"
      x-cloak
      x-show="reportIssueWindowOpen"
      :style="popupWindowStyle('report')"
      @keydown.escape.window="closePopupWindow('report')"
      @pointerdown.capture="startPopupWindowPointerDrag('report', $event)"
      @mousedown.capture="startPopupWindowPointerDrag('report', $event)"
    >
      <div
        class="popup-window-header"
      >
        <button class="popup-window-close" type="button" @click="closePopupWindow('report')" aria-label="Close Report issue window">
          <span aria-hidden="true">×</span>
        </button>
        <h3 class="popup-window-title">Report an Issue</h3>
      </div>
      <div class="popup-window-body">
        <p class="popup-window-subtitle">Describe what happened and what you expected. This submits through the dashboard action bus and keeps a local backup if core submission fails.</p>
        <textarea
          class="popup-window-textarea"
          x-model="reportIssueDraft"
          placeholder="Issue summary, steps to reproduce, screenshots, expected behavior..."
          spellcheck="true"
        ></textarea>
        <div style="display:flex;justify-content:flex-end;align-items:center;gap:8px;padding-top:4px">
          <button class="btn btn-primary btn-sm" type="button" :disabled="!String(reportIssueDraft || '').trim()" @click="submitReportIssueDraft()">Submit issue</button>
        </div>
      </div>
    </infring-popup-window-shell>
