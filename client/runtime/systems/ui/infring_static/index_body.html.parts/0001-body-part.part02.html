      x-transition:leave="transition ease-in duration-130"
      x-transition:leave-start="opacity-100 transform translate-y-0"

          aria-label="Search"

      :style="popupWindowStyle('manual')"

    <infring-popup-window-shell
      class="popup-window popup-window-report drag-bar"
      :class="{ 'is-container-dragging': popupWindowDragActive && popupWindowDragKind === 'report' }"
      data-popup-window-kind="report"
      kind="report"
      :open="reportIssueWindowOpen"
      :dragging="popupWindowDragActive && popupWindowDragKind === 'report'"
      x-cloak
      x-show="reportIssueWindowOpen"
      :style="popupWindowStyle('report')"
      @keydown.escape.window="closePopupWindow('report')"
      @pointerdown.capture="startPopupWindowPointerDrag('report', $event)"
      @mousedown.capture="startPopupWindowPointerDrag('report', $event)"
    >
      <div
        class="popup-window-header"
      >
        <button class="popup-window-close" type="button" @click="closePopupWindow('report')" aria-label="Close Report issue window">
          <span aria-hidden="true">×</span>
        </button>
        <h3 class="popup-window-title">Report an Issue</h3>
      </div>
      <div class="popup-window-body">
        <p class="popup-window-subtitle">Describe what happened and what you expected. This submits through the shell action bus and keeps a local backup if core submission fails.</p>

          x-model="reportIssueDraft"
          placeholder="Issue summary, steps to reproduce, screenshots, expected behavior..."

        <div style="display:flex;justify-content:flex-end;align-items:center;gap:8px;padding-top:4px">
          <button class="btn btn-primary btn-sm" type="button" :disabled="!String(reportIssueDraft || '').trim()" @click="submitReportIssueDraft()">Submit issue</button>
        </div>
      </div>
