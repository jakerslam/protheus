                              <svg x-show="msg._copied" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>

                              <svg x-show="!allToolsCollapsed(msg)" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"></path></svg>

                            <button class="message-stat-btn" x-show="messageCanRetryFromMeta(msg, idx, messages)" @click="retryMessageFromMeta(msg, idx, messages)" title="Retry from this turn" aria-label="Retry from this turn"><svg class="message-stat-icon message-stat-icon-refresh" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg></button>
                            <button class="message-stat-btn message-action-reply" x-show="messageCanReplyFromMeta(msg, idx, messages)" @click="replyToMessageFromMeta(msg, idx, messages)" title="Reply to this message" aria-label="Reply to this message"><svg class="message-stat-icon message-stat-icon-reply" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 14-5-5 5-5"/><path d="M20 20v-5a6 6 0 0 0-6-6H4"/></svg><span class="message-reply-label">Reply</span></button>
                            <button class="message-stat-btn" x-show="messageCanForkFromMeta(msg)" @click="forkMessageFromMeta(msg, idx, messages)" title="Fork to a new agent" aria-label="Fork to a new agent"><svg class="message-stat-icon message-stat-icon-fork" width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75v-.878a2.25 2.25 0 1 1 1.5 0v.878a2.25 2.25 0 0 1-2.25 2.25h-1.5v2.128a2.251 2.251 0 1 1-1.5 0V8.5h-1.5A2.25 2.25 0 0 1 3.5 6.25v-.878a2.25 2.25 0 1 1 1.5 0ZM5 3.25a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Zm6.75.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm-3 8.75a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Z"/></svg></button>
                            <span class="message-stat-time" x-text="messageTs(msg)" x-show="messageMetaVisible(msg, idx, messages) && messageTs(msg)"></span>
                            <span class="message-stat-meta" x-text="messageStatResponseTimeText(msg)" x-show="messageMetaVisible(msg, idx, messages) && messageStatResponseTimeText(msg)"></span>
                            <span class="message-stat-burn" x-show="messageMetaVisible(msg, idx, messages) && messageStatBurnLabelText(msg)"><img class="message-meta-icon message-stat-burn-icon" src="/icons/vecteezy_fire-icon-simple-vector-perfect-illustration_13821331.svg" alt="" aria-hidden="true"><span x-text="messageStatBurnLabelText(msg)"></span></span>
                          </div>
                          </div>
                          <div class="message-source-chips" x-show="messageHasSourceChips(msg)"><template x-for="chip in messageSourceChips(msg)" :key="chip.id"><a class="message-source-chip" :href="chip.url" target="_blank" rel="noopener" :title="chip.url"><span class="message-source-chip-label" x-text="chip.label"></span><span class="message-source-chip-host" x-show="chip.host" x-text="chip.host"></span></a></template></div>
                          <div class="message-tool-trace-summary" x-show="messageToolTraceSummary(msg).visible"><span class="message-tool-trace-label" x-text="messageToolTraceSummary(msg).label"></span><span class="message-tool-trace-detail" x-text="messageToolTraceSummary(msg).detail"></span></div>
                          <template x-if="messageProgress(msg)">
                            <div class="chat-progress-wrap">
                              <div class="chat-progress-meta">
                                <span x-text="messageProgress(msg).label"></span>
                                <span x-text="messageProgress(msg).percent + '%'"></span>
                              </div>
                              <div class="chat-progress-track">
                                <span class="chat-progress-fill" :style="progressFillStyle(msg)"></span>
                              </div>
                            </div>
                          </template>
                          <template x-if="msg.file_output && msg.file_output.path">
                            <div class="chat-artifact-card chat-file-output">
                              <div class="chat-artifact-head">
                                <span class="chat-artifact-title">File Output</span>
                                <span class="chat-artifact-path" x-text="msg.file_output.path"></span>
                              </div>
                              <pre class="chat-artifact-pre" x-text="msg.file_output.content || ''"></pre>
                            </div>
                          </template>
                          <template x-if="msg.folder_output && msg.folder_output.path">
                            <div class="chat-artifact-card chat-folder-output">
                              <div class="chat-artifact-head">
                                <span class="chat-artifact-title">Folder Output</span>
                                <span class="chat-artifact-path" x-text="msg.folder_output.path"></span>
                              </div>
                              <pre class="chat-artifact-pre" x-text="msg.folder_output.tree || ''"></pre>

                                Download archive
                              </a>
                            </div>
                          </template>
                          <template x-if="msg.images && msg.images.length">
                            <div style="display:flex;flex-wrap:wrap;gap:8px;margin:8px 0">

                                <a :href="'/api/uploads/' + img.file_id" target="_blank" style="display:block">

                              </template>
                            </div>
                          </template>
                          <template x-for="tool in (msg.tools || [])" :key="tool.id">

                              <div class="tool-card-header" @click="tool.expanded = !tool.expanded">
                                <template x-if="isThoughtTool(tool)">
                                  <span class="tool-card-thought-brain" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" focusable="false">
                                      <path d="M9 3c-2.8 0-5 2.2-5 5 0 .5.1 1 .2 1.4A3.8 3.8 0 0 0 3 12.1C3 14.3 4.7 16 6.9 16H9" />
                                      <path d="M15 3c2.8 0 5 2.2 5 5 0 .5-.1 1-.2 1.4a3.8 3.8 0 0 1 1.2 2.7c0 2.2-1.7 3.9-3.9 3.9H15" />
                                      <path d="M9 3v13M15 3v13" />
                                      <path d="M9 7.2h1.1c.6 0 1 .4 1 1v.5c0 .6.4 1 1 1h.8c.6 0 1 .4 1 1V11" />
                                      <path d="M9 11.8h1.1c.6 0 1 .4 1 1v.4c0 .6.4 1 1 1h.8c.6 0 1 .4 1 1V16" />
                                    </svg>
                                  </span>
                                </template>
                                <template x-if="!isThoughtTool(tool) && tool.running"><div class="tool-card-spinner"></div></template>
                                <template x-if="!isThoughtTool(tool) && !tool.running && isBlockedTool(tool)">
                                  <span class="tool-icon-blocked" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" focusable="false">
                                      <path d="M12 3 5 6v6c0 5.2 3.6 8.6 7 10 3.4-1.4 7-4.8 7-10V6l-7-3z"></path>
                                    </svg>
                                  </span>
                                </template>
                                <template x-if="!isThoughtTool(tool) && !tool.running && !isBlockedTool(tool) && !tool.is_error"><span class="tool-icon-ok">&#10003;</span></template>
                                <template x-if="!isThoughtTool(tool) && !tool.running && tool.is_error && !isBlockedTool(tool)"><span class="tool-icon-err">&#10007;</span></template>
                                <span class="tool-card-icon" x-show="!isThoughtTool(tool)" x-html="toolIcon(tool.name)"></span>
                                <span class="tool-card-name" x-text="isThoughtTool(tool) ? thoughtToolLabel(tool) : toolDisplayName(tool)"></span>
                                <span x-show="!isThoughtTool(tool)" class="text-xs" :class="{ 'tool-status-blocked': isBlockedTool(tool), 'tool-status-success': isToolSuccessful(tool), 'text-dim': !isBlockedTool(tool) && !isToolSuccessful(tool) }" x-text="toolStatusText(tool)" style="margin-left:auto"></span>
                                <span class="tool-expand-chevron" :style="isThoughtTool(tool) ? 'margin-left:auto' : ''" x-text="tool.expanded ? '▾' : '▸'"></span>
                              </div>

                                <div x-show="tool.input" style="margin-bottom:6px">
                                  <div class="tool-section-label">Input</div>
                                  <pre class="tool-pre" x-text="formatToolJson(tool.input)"></pre>
                                </div>
                                <div x-show="tool.result">
                                  <div class="tool-section-label">Result <span class="text-xs text-muted" x-show="tool.result && tool.result.length > 200" x-text="'(' + tool.result.length + ' chars)'"></span></div>
                                  <pre class="tool-pre" :class="{ 'tool-pre-error': tool.is_error, 'tool-pre-short': !tool.is_error && tool.result && tool.result.length < 100, 'tool-pre-medium': !tool.is_error && tool.result && tool.result.length >= 100 && tool.result.length < 500 }" x-text="formatToolJson(tool.result)"></pre>
                                </div>
                              </div>
                            </div>
                          </template>
                        </div>
                      </infring-chat-stream-shell>
                    </template>
                  </div>
                </template>
                <template x-if="currentAgent && !sessionLoading && (!messages || messages.length === 0) && !showFreshArchetypeTiles">
                  <infring-chat-stream-shell class="empty-state">
                    <h4>No messages yet</h4>
                    <p class="hint">Start chatting or initialize this agent.</p>
                    <div style="display:flex;align-items:center;justify-content:center;gap:8px">
                      <button class="btn btn-ghost btn-sm" @click="ensureFreshInitThread(currentAgent)">Initialize agent</button>
                      <button class="btn btn-primary btn-sm" @click="focusChatComposerFromInit('')">Start chat</button>
                    </div>
                  </infring-chat-stream-shell>
                </template>
                <infring-workspace-panel-shell>
                <infring-popup-window-shell class="chat-workspace-panel overlay-shared-surface" x-show="isWorkspacePanelOpen()" x-transition.opacity @click.outside="closeWorkspacePanel()">
                  <div class="chat-workspace-panel-head"><div><div class="chat-workspace-panel-title">Workspace</div><div class="chat-workspace-panel-subtitle" x-text="workspacePanelPayload() ? (workspacePanelPayload().actor + (workspacePanelPayload().timestamp ? (' · ' + workspacePanelPayload().timestamp) : '')) : ''"></div></div><button type="button" class="message-stat-btn" @click="closeWorkspacePanel()" title="Close workspace">✕</button></div>
                  <div class="chat-workspace-panel-body" x-show="workspacePanelPayload()"><div class="chat-workspace-panel-section" x-show="workspacePanelPayload() && workspacePanelPayload().preview"><div class="chat-workspace-panel-label">Summary</div><div class="chat-workspace-panel-text" x-text="workspacePanelPayload().preview"></div></div></div>
                </infring-popup-window-shell>
                </infring-workspace-panel-shell>
                <div class="chat-init-panel" :class="{ 'chat-init-panel-launching': freshInitLaunching }" x-show="showFreshArchetypeTiles && freshInitRevealMenu">
                  <div class="chat-archetype-title">Initialize Agent</div>
                  <div class="chat-archetype-subtitle">Pick role and lifespan, then launch. Optional tuning lives under advanced setup.</div>
                  <div class="chat-init-avatar-row" data-init-anchor="identity">
                    <div class="chat-agent-identity-avatar-wrap chat-init-avatar-wrap" @click.outside="freshInitEmojiPickerOpen = false">
                      <span class="chat-init-avatar-preview" aria-hidden="true">
                        <img
                          x-show="freshInitAvatarUrl"
                          :src="freshInitAvatarUrl"
                          :alt="currentAgent ? ((currentAgent.name || currentAgent.id || 'agent') + ' avatar') : 'agent avatar'"

                        />

                          x-show="!freshInitAvatarUrl && !!(freshInitEmoji || freshInitDefaultEmoji)"
                          x-text="freshInitEmoji || freshInitDefaultEmoji || ''"
                        ></span>
                        <span
                          class="infring-logo infring-logo--agent-default"
                          x-show="!freshInitAvatarUrl && !(freshInitEmoji || freshInitDefaultEmoji)"
                          aria-hidden="true"
                        ><span class="infring-logo-glyph" aria-hidden="true">&infin;</span></span>
                      </span>
                      <input
                        type="file"
                        x-ref="freshInitAvatarInput"
                        accept="image/*"
                        :disabled="freshInitLaunching"
                        style="display:none"
                        @change="uploadFreshInitAvatar($event.target.files); $event.target.value = ''"
                      >
                      <div class="chat-agent-avatar-actions chat-init-avatar-actions">
                        <button class="chat-agent-identity-pencil chat-agent-identity-pencil-avatar-action" @click.stop="toggleFreshInitEmojiPicker()" :disabled="freshInitLaunching" title="Pick emoji" aria-label="Pick emoji">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M8 15c1 .8 2.1 1.2 4 1.2s3-.4 4-1.2"></path><circle cx="9" cy="10" r="1"></circle><circle cx="15" cy="10" r="1"></circle></svg>
                        </button>
                        <button class="chat-agent-identity-pencil chat-agent-identity-pencil-avatar-action" @click.stop="openFreshInitAvatarPicker()" :disabled="freshInitLaunching || freshInitAvatarUploading" title="Upload avatar" aria-label="Upload avatar">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5-5 5 5"></path><path d="M12 5v12"></path></svg>
