        </div><!-- /activeChatAgent picker wrapper -->
      </div>
      </infring-agents-page-shell>
    </template>

    <!-- Page: Approvals -->
    <template x-if="page === 'approvals'">
      <infring-approvals-page-shell shellprimitive="simple-page-panel" pageid="approvals" panelrole="page" routecontract="approvals" parentowneddata="false"></infring-approvals-page-shell>
    </template>

    <!-- Page: Workflows -->
    <template x-if="page === 'workflows'">
      <infring-workflows-page-shell shellprimitive="simple-page-panel" pageid="workflows" panelrole="page" routecontract="workflows" parentowneddata="true">
      <div
        x-data="{ wfTab: (localStorage.getItem('infring-workflows-subtab') === 'builder' ? 'builder' : 'list') }"
        @wf-switch-tab.window="
          wfTab = ($event.detail === 'builder' ? 'builder' : 'list');
          localStorage.setItem('infring-workflows-subtab', wfTab);
        "
      >
        <div class="page-header page-header-subtabs-center">
          <div class="tabs mt-3" role="tablist">
            <div class="tab" role="tab" :class="{ active: page === 'scheduler' }" @click="navigate('scheduler')">Scheduler</div>
            <div class="tab" role="tab" :class="{ active: page === 'workflows' }" @click="navigate('workflows')">Workflows</div>
          </div>
          <div class="tabs tabs-subnav" role="tablist">
            <div
              class="tab"
              role="tab"
              :class="{ active: wfTab === 'list' }"
              @click="wfTab = 'list'; localStorage.setItem('infring-workflows-subtab', 'list')"
            >List</div>
            <div
              class="tab"
              role="tab"
              :class="{ active: wfTab === 'builder' }"
              @click="wfTab = 'builder'; localStorage.setItem('infring-workflows-subtab', 'builder')"
            >Visual Builder</div>
          </div>
        </div>

        <!-- Tab: List -->
        <template x-if="wfTab === 'list'">
        <infring-workflows-list-tab-shell shellprimitive="simple-page-panel" pageid="workflows" tabid="list" panelrole="workflow-tab" routecontract="workflows:list" parentowneddata="false"></infring-workflows-list-tab-shell>
        </template>

        <!-- Tab: Visual Builder -->
        <template x-if="wfTab === 'builder'">
        <infring-workflows-builder-tab-shell shellprimitive="simple-page-panel" pageid="workflows" tabid="builder" panelrole="workflow-tab" routecontract="workflows:builder" parentowneddata="true">
        <div x-data="workflowBuilder()" x-init="init()">
          <div class="wf-builder-layout">
            <!-- Node palette (left sidebar) -->
            <div class="wf-palette">
              <div class="wf-palette-title">Node Palette</div>
              <div class="text-xs text-dim mb-3">Drag nodes onto the canvas</div>
              <template x-for="nt in nodeTypes" :key="nt.type">
                <div class="wf-palette-node" draggable="true" @dragstart="onPaletteDragStart(nt.type, $event)"
                     :style="'border-left: 3px solid ' + nt.color">
                  <span class="wf-palette-icon" :style="'background:' + nt.color" x-text="nt.icon"></span>
                  <span class="text-xs" x-text="nt.label"></span>
                </div>
              </template>
              <hr style="border-color:var(--border);margin:12px 0">
              <div class="text-xs text-dim mb-2">Workflow</div>
              <div class="form-group" style="margin-bottom:8px">
                <input class="form-input" x-model="workflowName" placeholder="Workflow name" style="font-size:11px">
              </div>
              <div class="form-group" style="margin-bottom:8px">
                <input class="form-input" x-model="workflowDescription" placeholder="Description" style="font-size:11px">
              </div>
              <div class="flex flex-col gap-1">
                <button class="btn btn-primary btn-sm btn-block" @click="generateToml()">Export TOML</button>
                <button class="btn btn-primary btn-sm btn-block" @click="showSaveModal = true">Save Workflow</button>
                <button class="btn btn-ghost btn-sm btn-block" @click="autoLayout()">Auto Layout</button>
                <button class="btn btn-ghost btn-sm btn-block" @click="clearCanvas()">Clear</button>
              </div>

              <div class="wf-trace-panel">
                <div class="wf-trace-head">
                  <span>Execution Trace</span>
                  <button class="btn btn-ghost btn-sm" style="padding:2px 6px" @click="refreshTraceCatalog(true)" :disabled="traceLoading">↻</button>
                </div>
                <select class="form-select" style="font-size:11px" x-model="traceWorkflowId" @change="selectTraceWorkflow(traceWorkflowId)">
                  <option value="">Select workflow...</option>
                  <template x-for="wf in traceWorkflows" :key="'wf-trace-opt-' + wf.id">
                    <option :value="wf.id" x-text="wf.name || wf.id"></option>
                  </template>
                </select>
                <div class="wf-trace-status" x-show="traceLoading">Loading traces…</div>
                <div class="wf-trace-status wf-trace-error" x-show="!traceLoading && traceError" x-text="traceError"></div>
                <div class="wf-trace-empty" x-show="!traceLoading && !traceError && traceWorkflowId && !traceCards().length">No runs yet.</div>
                <div class="wf-trace-list" x-show="!traceLoading && !traceError && traceCards().length">
                  <template x-for="run in traceCards()" :key="'wf-trace-run-' + run.run_id">
                    <div class="wf-trace-card">
                      <div class="wf-trace-card-head">
                        <span class="wf-trace-run-id" x-text="run.run_id || 'run'"></span>
                        <span class="wf-trace-run-status" x-text="traceStatusLabel(run)"></span>
                      </div>
                      <div class="wf-trace-card-meta">
                        <span x-text="traceDurationLabel(run)"></span>
                        <span x-show="run.finished_at || run.started_at" x-text="new Date(run.finished_at || run.started_at).toLocaleString()"></span>
                      </div>
                      <template x-if="run.steps && run.steps.length">
                        <div class="wf-trace-step-list">
                          <template x-for="(step, sidx) in run.steps.slice(0, 4)" :key="'wf-trace-step-' + (run.run_id || 'run') + '-' + sidx">
                            <div class="wf-trace-step-row">
                              <span class="wf-trace-step-name" x-text="step.step || ('step-' + (sidx + 1))"></span>
                              <span class="wf-trace-step-preview" x-text="traceStepPreview(step)"></span>
                            </div>
                          </template>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </div>

            <!-- Canvas -->
            <div class="wf-canvas-wrap">
              <!-- Zoom controls -->
              <div class="wf-zoom-controls">
                <button class="btn btn-ghost btn-sm" @click="zoomOut()" title="Zoom out">-</button>
                <span class="text-xs" x-text="Math.round(zoom * 100) + '%'" style="min-width:36px;text-align:center"></span>
                <button class="btn btn-ghost btn-sm" @click="zoomIn()" title="Zoom in">+</button>
                <button class="btn btn-ghost btn-sm" @click="zoomReset()" title="Reset view">Fit</button>
              </div>

              <svg id="wf-canvas" class="wf-canvas"
                   @mousedown="onCanvasMouseDown($event)"
                   @mousemove="onCanvasMouseMove($event)"
                   @mouseup="onCanvasMouseUp()"
                   @mouseleave="onCanvasMouseUp()"
                   @wheel.prevent="onCanvasWheel($event)"
                   @drop="onCanvasDrop($event)"
                   @dragover="onCanvasDragOver($event)">
                <g :transform="'translate(' + (canvasOffset.x * zoom) + ',' + (canvasOffset.y * zoom) + ') scale(' + zoom + ')'">
                  <!-- Grid pattern -->
                  <defs>
                    <pattern id="wf-grid" width="20" height="20" patternUnits="userSpaceOnUse">
                      <circle cx="1" cy="1" r="0.5" fill="var(--text-dim)" opacity="0.15"/>
                    </pattern>
                  </defs>
                  <rect x="-2000" y="-2000" width="6000" height="6000" fill="url(#wf-grid)"/>

                  <!-- Manually rendered nodes & connections (Alpine x-for breaks inside SVG) -->
                  <g id="wf-render-group" x-effect="nodes.length; connections.length; selectedNode; selectedConnection; connecting; connectPreview; scheduleRender()"></g>
                </g>
              </svg>

              <!-- Canvas hints -->
              <div class="wf-canvas-hint" x-show="nodes.length <= 1">
                Drag nodes from the palette onto the canvas. Connect output ports (bottom) to input ports (top). Double-click to edit.
              </div>
            </div>

            <!-- Node editor panel (right sidebar) -->
            <div class="wf-editor-panel" x-show="showNodeEditor && selectedNode" x-transition>
              <div class="wf-editor-header">
                <span class="font-bold text-sm" x-text="selectedNode ? selectedNode.label : ''"></span>
                <button class="btn btn-ghost btn-sm" @click="showNodeEditor = false">&times;</button>
              </div>
              <template x-if="selectedNode">
                <div>
                  <div class="form-group">
                    <label class="text-xs">Label</label>
                    <input class="form-input" x-model="selectedNode.label" @input="applyNodeEdit()" style="font-size:11px">
                  </div>

                  <!-- Agent config -->
                  <template x-if="selectedNode.type === 'agent'">
                    <div>
                      <div class="form-group">
                        <label class="text-xs">Agent</label>
                        <select class="form-select" x-model="selectedNode.config.agent_name" x-effect="agents.length; selectedNode; renderAgentSelectOptions($el)" @change="applyNodeEdit()" style="font-size:11px">
                          <option value="">Select agent...</option>
                        </select>
                      </div>
                      <div class="form-group">
                        <label class="text-xs">Prompt Template</label>
                        <textarea class="form-textarea" x-model="selectedNode.config.prompt" @input="applyNodeEdit()" style="font-size:11px;min-height:60px" placeholder="{{input}}"></textarea>
                      </div>
                      <div class="form-group">
                        <label class="text-xs">Model (optional)</label>
                        <input class="form-input" x-model="selectedNode.config.model" @input="applyNodeEdit()" style="font-size:11px" placeholder="Default model">
                      </div>
                    </div>
                  </template>

                  <!-- Condition config -->
                  <template x-if="selectedNode.type === 'condition'">
                    <div>
                      <div class="form-group">
                        <label class="text-xs">Expression</label>
                        <input class="form-input" x-model="selectedNode.config.expression" @input="applyNodeEdit()" style="font-size:11px" placeholder="output.contains('yes')">
                      </div>
                      <div class="text-xs text-dim">Top port = true, bottom port = false</div>
                    </div>
                  </template>

                  <!-- Loop config -->
                  <template x-if="selectedNode.type === 'loop'">
                    <div>
                      <div class="form-group">
                        <label class="text-xs">Max Iterations</label>
                        <input type="number" class="form-input" x-model.number="selectedNode.config.max_iterations" @input="applyNodeEdit()" style="font-size:11px" min="1" max="100">
                      </div>
                      <div class="form-group">
                        <label class="text-xs">Until (stop condition)</label>
                        <input class="form-input" x-model="selectedNode.config.until" @input="applyNodeEdit()" style="font-size:11px" placeholder="output === 'done'">
                      </div>
                    </div>
                  </template>

                  <!-- Parallel config -->
                  <template x-if="selectedNode.type === 'parallel'">
                    <div>
                      <div class="form-group">
                        <label class="text-xs">Fan-out Count</label>
                        <input type="number" class="form-input" x-model.number="selectedNode.config.fan_count" @input="applyNodeEdit()" style="font-size:11px" min="2" max="10">
                      </div>
                    </div>
                  </template>

                  <!-- Collect config -->
                  <template x-if="selectedNode.type === 'collect'">
                    <div>
                      <div class="form-group">
                        <label class="text-xs">Strategy</label>
                        <select class="form-select" x-model="selectedNode.config.strategy" @change="applyNodeEdit()" style="font-size:11px">
                          <option value="all">Wait for all</option>
                          <option value="first">First to finish</option>
                          <option value="majority">Majority vote</option>
                        </select>
                      </div>
                    </div>
                  </template>

                  <hr style="border-color:var(--border);margin:12px 0">
                  <div class="flex gap-2">
                    <button class="btn btn-ghost btn-sm" @click="duplicateNode(selectedNode)">Duplicate</button>
                    <button class="btn btn-danger btn-sm" @click="deleteNode(selectedNode.id)">Delete</button>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Delete connection hint -->
          <div class="wf-conn-hint" x-show="selectedConnection" x-transition>
            <span class="text-xs">Connection selected</span>
            <button class="btn btn-danger btn-sm" @click="deleteConnection(selectedConnection.id)">Delete Connection</button>
          </div>

          <!-- TOML Preview modal -->
          <template x-if="showTomlPreview">
            <div class="modal-overlay" @click.self="showTomlPreview = false" @keydown.escape.window="showTomlPreview = false">
