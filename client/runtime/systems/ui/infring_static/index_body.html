<!-- Dashboard source segmented into index_body.html.parts. Edit part files in lexical order. -->
<body x-data="app" :data-theme="theme">

<!-- Startup splash -->
<div
  class="boot-splash"
  x-show="bootSplashVisible"
  x-transition.opacity.duration.220ms
  aria-hidden="true"
>
  <div class="boot-splash-inner">
    <div class="brand-mark boot-splash-mark"><span class="brand-mark-glyph">&infin;</span></div>
    <div class="boot-splash-wordmark">INFRING</div>
    <div
      class="boot-splash-progress"
      role="progressbar"
      aria-label="Loading progress"
      aria-valuemin="0"
      aria-valuemax="100"
      :aria-valuenow="Math.max(0, Math.min(100, Math.round(Number(bootProgressPercent || 0))))"
    >
      <span
        class="boot-splash-progress-fill"
        :style="'width:' + Math.max(0, Math.min(100, Number(bootProgressPercent || 0))) + '%'"
      ></span>
    </div>
  </div>
</div>

<!-- Auth Prompt (API Key or Username/Password) -->
<div x-cloak x-show="$store.app.showAuthPrompt" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px)" x-data="{ apiKeyInput: '', loginUser: '', loginPass: '' }">
  <div style="background:var(--bg-card,#1e1e2e);border:1px solid var(--border,#333);border-radius:12px;padding:2rem;max-width:400px;width:90%">
    <!-- Session login mode -->
    <template x-if="$store.app.authMode === 'session'">
      <div>
        <h3 style="margin:0 0 0.5rem;font-size:1.1rem">Sign In</h3>
        <p style="color:var(--text-dim,#888);font-size:0.85rem;margin:0 0 1rem">Enter your dashboard credentials.</p>
        <input type="text" x-model="loginUser" placeholder="Username" autocomplete="username" style="width:100%;padding:0.6rem;border-radius:6px;border:1px solid var(--border,#333);background:var(--bg-input,#151520);color:var(--text,#e0e0e0);font-size:0.9rem;box-sizing:border-box;margin-bottom:0.5rem">
        <input type="password" x-model="loginPass" placeholder="Password" autocomplete="current-password" @keydown.enter="$store.app.sessionLogin(loginUser, loginPass)" style="width:100%;padding:0.6rem;border-radius:6px;border:1px solid var(--border,#333);background:var(--bg-input,#151520);color:var(--text,#e0e0e0);font-size:0.9rem;box-sizing:border-box;margin-bottom:0.75rem">
        <button @click="$store.app.sessionLogin(loginUser, loginPass)" style="width:100%;padding:0.6rem;border-radius:6px;border:none;background:var(--accent,#7c3aed);color:#fff;font-weight:600;cursor:pointer;font-size:0.9rem">Sign In</button>
      </div>
    </template>
    <!-- API key mode -->
    <template x-if="$store.app.authMode === 'apikey'">
      <div>
        <h3 style="margin:0 0 0.5rem;font-size:1.1rem">API Key Required</h3>
        <p style="color:var(--text-dim,#888);font-size:0.85rem;margin:0 0 0.5rem">This instance requires an API key. Enter the key from your <code>config.toml</code>.</p>
        <p style="color:var(--text-dim,#666);font-size:0.75rem;margin:0 0 1rem">Add <code style="color:var(--accent-light,#a78bfa);background:var(--bg,#111);padding:1px 4px;border-radius:2px">api_key = "your-key"</code> at the <strong>top</strong> of <code>~/.infring/config.toml</code> (not under any [section]).</p>
        <input type="password" x-model="apiKeyInput" placeholder="Enter API key..." @keydown.enter="$store.app.submitApiKey(apiKeyInput)" style="width:100%;padding:0.6rem;border-radius:6px;border:1px solid var(--border,#333);background:var(--bg-input,#151520);color:var(--text,#e0e0e0);font-size:0.9rem;box-sizing:border-box;margin-bottom:0.75rem">
        <button @click="$store.app.submitApiKey(apiKeyInput)" style="width:100%;padding:0.6rem;border-radius:6px;border:none;background:var(--accent,#7c3aed);color:#fff;font-weight:600;cursor:pointer;font-size:0.9rem">Unlock Dashboard</button>
      </div>
    </template>
  </div>
</div>

<div class="app-layout" :class="{ 'focus-mode': $store.app.focusMode, 'topbar-bottom': topbarDockEdge === 'bottom' }">
  <!-- Sidebar -->
  <nav class="sidebar" :class="{ collapsed: sidebarCollapsed, 'mobile-open': mobileMenuOpen, 'chat-only-hidden': page !== 'chat' }">
    <div class="sidebar-nav-shell">
    <div class="sidebar-nav" role="navigation" aria-label="Main navigation" x-ref="sidebarNav" @scroll.passive="scheduleSidebarScrollIndicators(); hideDashboardPopupBySource('sidebar')">
      <div class="sidebar-top-ghost" aria-hidden="true"></div>
      <!-- Agents conversations — primary action -->
      <div class="nav-section" aria-label="Agent conversations">
          <div>
            <a
              class="nav-item sidebar-tab-item"
              :class="{ active: page === 'chat' }"
              @click="navigate('chat')"
              :aria-current="page === 'chat' ? 'page' : false"
              @mouseenter="if (sidebarCollapsed) showCollapsedSidebarNavPopup('Conversations', $event)"
              @mousemove="if (sidebarCollapsed) showCollapsedSidebarNavPopup('Conversations', $event)"
              @mouseleave="if (sidebarCollapsed) hideDashboardPopupBySource('sidebar')"
            >
              <span class="nav-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
              </span>
              <span class="nav-label">Conversations</span>
            </a>
            <div class="nav-sub-search-row">
              <div
                class="nav-sub-search-wrap nav-sub-search-coming-soon"
                :class="{ 'is-active': false, 'is-loading': false }"
                @mouseenter="showDashboardPopup('chat-nav-utility:conversation-search', 'Conversation search', $event, { source: 'chat_nav', side: 'right', body: 'Search coming soon', meta_origin: 'Chat nav' })"
                @mousemove="showDashboardPopup('chat-nav-utility:conversation-search', 'Conversation search', $event, { source: 'chat_nav', side: 'right', body: 'Search coming soon', meta_origin: 'Chat nav' })"
                @mouseleave="hideDashboardPopup('chat-nav-utility:conversation-search')"
              >
                <span class="nav-sub-search-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.6-3.6"></path></svg>
                </span>
                <input
                  type="text"
                  class="nav-sub-search-input"
                  x-model="chatSidebarQuery"
                  placeholder="Search conversations..."
                  aria-label="Search conversations"
                  readonly
                  disabled
                >
                <button
                  type="button"
                  class="nav-sub-search-clear"
                  x-show="false"
                  @click="chatSidebarQuery=''; clearChatSidebarSearch()"
                  aria-label="Clear search"
                >
                  &times;
                </button>
                <span class="spinner-sm nav-sub-search-spinner" x-show="false" aria-hidden="true"></span>
              </div>
            </div>
            <div class="nav-sub-item-controls">
              <div
                class="nav-sub-sort-group nav-sub-sort-pill icon-pill-toggle"
                role="group"
                aria-label="Sort conversations"
                :data-mode="chatSidebarSortMode === 'topology' ? 'topology' : 'age'"
              >
                <button
                  type="button"
                  class="nav-sub-sort-btn"
                  :class="{ active: chatSidebarSortMode === 'age' }"
                  @click.stop="setChatSidebarSortMode('age')"
                  @mouseenter="showDashboardPopup('chat-nav-utility:sort-conversations', 'Sort conversations', $event, { source: 'chat_nav', side: 'right', body: 'Sort by recent activity', meta_origin: 'Chat nav' })"
                  @mousemove="showDashboardPopup('chat-nav-utility:sort-conversations', 'Sort conversations', $event, { source: 'chat_nav', side: 'right', body: 'Sort by recent activity', meta_origin: 'Chat nav' })"
                  @mouseleave="hideDashboardPopup('chat-nav-utility:sort-conversations')"
                  @focus="showDashboardPopup('chat-nav-utility:sort-conversations', 'Sort conversations', $event, { source: 'chat_nav', side: 'right', body: 'Sort by recent activity', meta_origin: 'Chat nav' })"
                  @blur="hideDashboardPopup('chat-nav-utility:sort-conversations')"
                  aria-label="Sort by recent activity"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v6l4 2"></path></svg>
                </button>
                <button
                  type="button"
                  class="nav-sub-sort-btn"
                  :class="{ active: chatSidebarSortMode === 'topology' }"
                  @click.stop="setChatSidebarSortMode('topology')"
                  @mouseenter="showDashboardPopup('chat-nav-utility:sort-conversations', 'Sort conversations', $event, { source: 'chat_nav', side: 'right', body: 'Sort by topology', meta_origin: 'Chat nav' })"
                  @mousemove="showDashboardPopup('chat-nav-utility:sort-conversations', 'Sort conversations', $event, { source: 'chat_nav', side: 'right', body: 'Sort by topology', meta_origin: 'Chat nav' })"
                  @mouseleave="hideDashboardPopup('chat-nav-utility:sort-conversations')"
                  @focus="showDashboardPopup('chat-nav-utility:sort-conversations', 'Sort conversations', $event, { source: 'chat_nav', side: 'right', body: 'Sort by topology', meta_origin: 'Chat nav' })"
                  @blur="hideDashboardPopup('chat-nav-utility:sort-conversations')"
                  aria-label="Sort by topology"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h10"></path><path d="M5 12h14"></path><path d="M5 17h8"></path><path d="m16 5 3 2-3 2"></path><path d="m20 10 3 2-3 2"></path><path d="m14 15 3 2-3 2"></path></svg>
                </button>
              </div>
            <a
                class="nav-item nav-sub-item nav-sub-item-action nav-sub-item-action-right nav-sub-item-action-new-agent"
                :class="{ 'is-loading': sidebarSpawningAgent }"
                :aria-disabled="sidebarSpawningAgent ? 'true' : 'false'"
                @click="if (!sidebarSpawningAgent) createSidebarAgentChat()"
              >
                <span class="nav-icon new-agent-plus-icon-wrap">
                  <svg viewBox="0 0 24 24" aria-hidden="true" :style="sidebarSpawningAgent ? 'opacity:0.45' : ''"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
                  <span class="spinner-sm new-agent-plus-spinner" x-show="sidebarSpawningAgent" aria-hidden="true"></span>
                </span>
                <span class="nav-label" x-text="sidebarSpawningAgent ? 'Creating…' : 'New agent'"></span>
              </a>
            </div>
            <a
              class="nav-item nav-sub-item nav-sub-item-action nav-sub-item-action-collapsed nav-sub-item-action-new-agent"
              :class="{ 'is-loading': sidebarSpawningAgent }"
              x-show="sidebarCollapsed"
              :aria-disabled="sidebarSpawningAgent ? 'true' : 'false'"
              @click="if (!sidebarSpawningAgent) createSidebarAgentChat()"
              @mouseenter="showDashboardPopup('chat-nav-utility:new-agent', 'New agent', $event, { source: 'chat_nav', side: 'right', body: sidebarSpawningAgent ? 'Agent creation already in progress' : 'Create a new agent conversation', meta_origin: 'Chat nav' })"
              @mousemove="showDashboardPopup('chat-nav-utility:new-agent', 'New agent', $event, { source: 'chat_nav', side: 'right', body: sidebarSpawningAgent ? 'Agent creation already in progress' : 'Create a new agent conversation', meta_origin: 'Chat nav' })"
              @mouseleave="hideDashboardPopup('chat-nav-utility:new-agent')"
              aria-label="New agent"
            >
              <span class="nav-icon new-agent-plus-icon-wrap">
                <svg viewBox="0 0 24 24" aria-hidden="true" :style="sidebarSpawningAgent ? 'opacity:0.45' : ''"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
                <span class="spinner-sm new-agent-plus-spinner" x-show="sidebarSpawningAgent" aria-hidden="true"></span>
              </span>
            </a>
            <template x-for="agent in chatSidebarVisibleRows" :key="'nav-agent-' + agent.id + '-' + (agent._sidebar_search_result ? 'search' : 'live')">
              <a
                class="nav-item nav-sub-item nav-agent-row"
                :data-agent-id="String(agent.id || '')"
                :class="{
                  active: page === 'chat' && $store.app.activeAgentId === agent.id,
                  'nav-agent-row-archived': !!agent.archived,
                  'nav-agent-row-timeout': !!agent._timed_out_local,
                  'nav-agent-row-with-countdown': shouldShowExpiryCountdown(agent) || shouldShowInfinityLifespan(agent),
                  'nav-agent-row-draggable': chatSidebarCanReorderTopology(),
                  dragging: chatSidebarCanReorderTopology() && chatSidebarDragAgentId === String(agent.id),
                  'drag-target': chatSidebarCanReorderTopology() && chatSidebarDropTargetId === String(agent.id),
                  'drop-before': chatSidebarCanReorderTopology() && chatSidebarDropTargetId === String(agent.id) && !chatSidebarDropAfter,
                  'drop-after': chatSidebarCanReorderTopology() && chatSidebarDropTargetId === String(agent.id) && chatSidebarDropAfter
                }"
                @click="selectAgentChatFromSidebar(agent)"
                :aria-current="page === 'chat' && $store.app.activeAgentId === agent.id ? 'page' : false"
                :draggable="chatSidebarCanReorderTopology()"
                @dragstart="startChatSidebarTopologyDrag(agent, $event)"
                @dragover="handleChatSidebarTopologyDragOver(agent, $event)"
                @drop="handleChatSidebarTopologyDrop(agent, $event)"
                @dragend="endChatSidebarTopologyDrag()"
                @mouseenter="if (sidebarCollapsed) showCollapsedSidebarAgentPopup(agent, $event)"
                @mousemove="if (sidebarCollapsed) showCollapsedSidebarAgentPopup(agent, $event)"
                @mouseleave="if (sidebarCollapsed) hideDashboardPopupBySource('sidebar')"
              >
                <span class="nav-icon nav-agent-icon">
                  <span class="nav-agent-avatar-wrap" :class="{ 'nav-agent-avatar-archived-mask': !!agent.archived, 'nav-agent-avatar-timeout-mask': !!agent._timed_out_local, 'nav-agent-avatar-expiring-critical': expiryCountdownCritical(agent) }">
                    <span class="agent-activity-spinner" x-show="$store.app.isAgentLiveBusy(agent)" aria-hidden="true"></span>
                    <span class="nav-agent-avatar">
                      <img
                        x-show="agent.avatar_url"
                        :src="agent.avatar_url || ''"
                        :alt="(agent.name || agent.id || 'agent') + ' avatar'"
                        loading="lazy"
                      />
                      <span class="nav-agent-avatar-emoji" x-show="!agent.avatar_url && !!sidebarDisplayEmoji(agent)" x-text="sidebarDisplayEmoji(agent)"></span>
                      <span class="nav-agent-avatar-fallback" x-show="!agent.avatar_url && !sidebarDisplayEmoji(agent)" aria-hidden="true">&infin;</span>
                    </span>
                    <span
                      class="agent-expiry-countdown"
                      :class="{ critical: expiryCountdownCritical(agent) }"
                      x-show="shouldShowExpiryCountdown(agent)"
                      x-text="expiryCountdownLabel(agent)"
                    ></span>
                    <span
                      class="agent-expiry-countdown infinite"
                      x-show="shouldShowInfinityLifespan(agent)"
                    >&infin;</span>
                  </span>
                  <span
                    class="agent-status-dot nav-agent-status"
                    :class="'status-' + $store.app.agentStatusState(agent)"
                    @mouseenter="if (String(agentStatusLabel(agent) || '').trim()) showDashboardPopup('chat-nav-status:' + String(agent.id || ''), 'Agent status', $event, { source: 'chat_nav', side: 'right', body: String(agentStatusLabel(agent) || '').trim(), meta_origin: 'Chat nav', meta_time: formatChatSidebarTime((chatSidebarPreview(agent) || {}).ts) }); else hideDashboardPopup('chat-nav-status:' + String(agent.id || ''))"
                    @mousemove="if (String(agentStatusLabel(agent) || '').trim()) showDashboardPopup('chat-nav-status:' + String(agent.id || ''), 'Agent status', $event, { source: 'chat_nav', side: 'right', body: String(agentStatusLabel(agent) || '').trim(), meta_origin: 'Chat nav', meta_time: formatChatSidebarTime((chatSidebarPreview(agent) || {}).ts) }); else hideDashboardPopup('chat-nav-status:' + String(agent.id || ''))"
                    @mouseleave="hideDashboardPopup('chat-nav-status:' + String(agent.id || ''))"
                    aria-hidden="true"
                  ></span>
                </span>
                <span class="nav-agent-main">
                  <span class="nav-agent-top">
                    <span class="nav-agent-name truncate" x-text="agent.name || agent.id"></span>
                    <span class="nav-agent-meta">
                      <span
                        class="nav-agent-tool-pill"
                        x-show="chatSidebarPreview(agent).has_tools"
                        :class="'state-' + (chatSidebarPreview(agent).tool_state || 'warning')"
                        @mouseenter="if (String((chatSidebarPreview(agent) || {}).tool_label || '').trim()) showDashboardPopup('chat-nav-tool:' + String(agent.id || ''), 'Tool activity', $event, { source: 'chat_nav', side: 'right', body: String((chatSidebarPreview(agent) || {}).tool_label || '').trim(), meta_origin: 'Chat nav', meta_time: formatChatSidebarTime((chatSidebarPreview(agent) || {}).ts), unread: !!(chatSidebarPreview(agent) || {}).unread_response }); else hideDashboardPopup('chat-nav-tool:' + String(agent.id || ''))"
                        @mousemove="if (String((chatSidebarPreview(agent) || {}).tool_label || '').trim()) showDashboardPopup('chat-nav-tool:' + String(agent.id || ''), 'Tool activity', $event, { source: 'chat_nav', side: 'right', body: String((chatSidebarPreview(agent) || {}).tool_label || '').trim(), meta_origin: 'Chat nav', meta_time: formatChatSidebarTime((chatSidebarPreview(agent) || {}).ts), unread: !!(chatSidebarPreview(agent) || {}).unread_response }); else hideDashboardPopup('chat-nav-tool:' + String(agent.id || ''))"
                        @mouseleave="hideDashboardPopup('chat-nav-tool:' + String(agent.id || ''))"
                      >
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                      </span>
                      <span class="nav-agent-time" x-text="formatChatSidebarTime(chatSidebarPreview(agent).ts)"></span>
                    </span>
                  </span>
                  <span class="nav-agent-bottom">
                    <span
                      class="nav-agent-preview"
                      :class="{ 'preview-unread': !!chatSidebarPreview(agent).unread_response, 'nav-agent-preview-timeout': !!agent._timed_out_local }"
                      x-text="chatSidebarPreview(agent).text || ((agent.is_system_thread === true || String(agent.id || '').toLowerCase() === 'system') ? '' : 'No messages yet')"
                    ></span>
                    <button
                      class="nav-agent-archive"
                      x-show="!agent.archived && !(agent.is_system_thread === true || String(agent.id || '').toLowerCase() === 'system') && confirmArchiveAgentId !== String(agent.id)"
                      @click.stop="confirmArchiveAgentId = String(agent.id)"
                      @mouseenter="showDashboardPopup('chat-nav-utility:archive-chat', 'Archive chat', $event, { source: 'chat_nav', side: 'right', body: 'Archive this agent conversation', meta_origin: 'Chat nav' })"
                      @mousemove="showDashboardPopup('chat-nav-utility:archive-chat', 'Archive chat', $event, { source: 'chat_nav', side: 'right', body: 'Archive this agent conversation', meta_origin: 'Chat nav' })"
                      @mouseleave="hideDashboardPopup('chat-nav-utility:archive-chat')"
                    >
                      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="5" rx="1"/><path d="M5 9h14v10a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2z"/><path d="M10 13h4"/></svg>
                    </button>
                    <button
                      class="nav-agent-archive nav-agent-archive-confirm"
                      x-show="!agent.archived && !(agent.is_system_thread === true || String(agent.id || '').toLowerCase() === 'system') && confirmArchiveAgentId === String(agent.id)"
                      @click.stop="archiveAgentFromSidebar(agent)"
                      @mouseleave="hideDashboardPopup('chat-nav-utility:confirm-archive'); if (confirmArchiveAgentId === String(agent.id)) confirmArchiveAgentId = ''"
                      @mouseenter="showDashboardPopup('chat-nav-utility:confirm-archive', 'Confirm archive', $event, { source: 'chat_nav', side: 'right', body: 'Archive this agent conversation now', meta_origin: 'Chat nav' })"
                      @mousemove="showDashboardPopup('chat-nav-utility:confirm-archive', 'Confirm archive', $event, { source: 'chat_nav', side: 'right', body: 'Archive this agent conversation now', meta_origin: 'Chat nav' })"
                    >
                      Confirm
                    </button>
                  </span>
                </span>
              </a>
            </template>
            <div class="nav-item nav-sub-item nav-sub-item-empty" x-show="$store.app.agentsLoading || !$store.app.agentsHydrated">
              <span class="nav-icon nav-loading-icon" aria-hidden="true"></span>
              <span class="nav-label">Loading agents...</span>
            </div>
            <div class="nav-item nav-sub-item nav-sub-item-empty" x-show="!($store.app.agentsLoading || !$store.app.agentsHydrated) && !chatSidebarRows.length && !isChatSidebarSearchActive()">
              <span class="nav-icon" aria-hidden="true">&#8722;</span>
              <span class="nav-label">No agents</span>
            </div>
            <div class="nav-item nav-sub-item nav-sub-item-empty" x-show="isChatSidebarSearchActive() && !chatSidebarSearchLoading && !chatSidebarRows.length">
              <span class="nav-icon" aria-hidden="true">&#8722;</span>
              <span class="nav-label">No matches</span>
            </div>
            <a
              class="nav-item sidebar-tab-item"
              :class="{ active: ['agents','sessions','approvals'].indexOf(page) >= 0 }"
              @click="navigate('agents')"
              :aria-current="['agents','sessions','approvals'].indexOf(page) >= 0 ? 'page' : false"
              @mouseenter="if (sidebarCollapsed) showCollapsedSidebarNavPopup('Agents', $event)"
              @mousemove="if (sidebarCollapsed) showCollapsedSidebarNavPopup('Agents', $event)"
              @mouseleave="if (sidebarCollapsed) hideDashboardPopupBySource('sidebar')"
            >
              <span class="nav-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              </span>
              <span class="nav-label">Agents</span>
            </a>
          </div>
      </div>

      <!-- Automation -->
      <div class="nav-section sidebar-tab-section" aria-label="Automation">
          <div>
            <a
              class="nav-item sidebar-tab-item"
              :class="{ active: ['scheduler','workflows'].indexOf(page) >= 0 }"
              @click="navigate('scheduler')"
              :aria-current="['scheduler','workflows'].indexOf(page) >= 0 ? 'page' : false"
              @mouseenter="if (sidebarCollapsed) showCollapsedSidebarNavPopup('Automation', $event)"
              @mousemove="if (sidebarCollapsed) showCollapsedSidebarNavPopup('Automation', $event)"
              @mouseleave="if (sidebarCollapsed) hideDashboardPopupBySource('sidebar')"
            >
              <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></span>
              <span class="nav-label">Automation</span>
            </a>
          </div>
      </div>

      <!-- Apps -->
      <div class="nav-section sidebar-tab-section" aria-label="Apps">
          <div>
            <a
              class="nav-item sidebar-tab-item"
              :class="{ active: ['channels','eyes','skills','hands'].indexOf(page) >= 0 }"
              @click="navigate('skills')"
              :aria-current="['channels','eyes','skills','hands'].indexOf(page) >= 0 ? 'page' : false"
              @mouseenter="if (sidebarCollapsed) showCollapsedSidebarNavPopup('Apps', $event)"

                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="6" cy="6" r="3"></circle>
                    <circle cx="18" cy="18" r="3"></circle>
                    <path d="M6 9v6a6 6 0 0 0 6 6h3"></path>
                    <path d="M18 15V9"></path>

                  <span class="chat-branch-label" x-text="activeGitBranchLabel"></span>
                  <svg class="chat-branch-caret" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" :class="{ 'open': showGitTreeMenu }" aria-hidden="true">
                    <path d="M6 9l6 6 6-6"></path>

                </button>
                <div class="chat-branch-menu" x-show="showGitTreeMenu" x-cloak @click.outside="closeGitTreeMenu()">

                  <div class="chat-branch-menu-status" x-show="gitTreeMenuLoading">Loading trees…</div>
                  <div class="chat-branch-menu-status chat-branch-menu-error" x-show="!gitTreeMenuLoading && gitTreeMenuError" x-text="gitTreeMenuError"></div>
                  <div class="chat-branch-menu-list" x-show="!gitTreeMenuLoading && !gitTreeMenuError">

                      <button
                        type="button"
                        class="chat-branch-menu-item"
                        :class="{ 'active': row.current }"

                      >
                        <span class="chat-branch-menu-item-name" x-text="row.branch"></span>
                        <span class="chat-branch-menu-item-meta" x-text="row.main ? 'main' : (row.in_use_by_agents > 0 ? (row.in_use_by_agents + ' agents') : 'branch')"></span>
                      </button>
                    </template>
                  </div>
                  <button type="button" class="chat-branch-menu-create" :disabled="gitTreeSwitching" @click="createAndCheckoutGitBranch()">
                    Create and checkout new branch
                  </button>
                </div>
              </div>
              <div class="context-ring dashboard-preview-trigger dashboard-preview-wrap" :data-tooltip="contextRingTooltip" tabindex="0">
                <svg viewBox="0 0 36 36" aria-hidden="true">
                  <circle class="context-ring-track" cx="18" cy="18" r="14" pathLength="100"></circle>
                  <circle class="context-ring-progress" cx="18" cy="18" r="14" pathLength="100" :style="contextRingProgressStyle"></circle>
                </svg>
              </div>
            </div>
            <div class="chat-archived-banner chat-archived-banner-bottom-center" x-show="currentAgent && isCurrentAgentArchived && isCurrentAgentArchived()">
              <button type="button" class="btn btn-primary btn-sm" @click="reviveCurrentArchivedAgent()">Revive Agent</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    </template>

    <!-- Page: Agents -->
    <template x-if="page === 'agents'">
      <div x-data="agentsPage" @close-chat.window="closeChat()">

        <!-- MODE 1: Inline Chat (agent selected) -->
        <template x-if="activeChatAgent">
          <div x-data="chatPage" class="chat-wrapper" :class="{ 'chat-resize-blur-active': chatResizeBlurActive, 'chat-wrapper-archived-thread': isCurrentAgentArchived && isCurrentAgentArchived() }">
            <!-- Chat header with back button -->
            <div class="page-header" x-show="currentAgent">
              <div class="flex items-center gap-2" style="min-width:0">
                <button class="btn btn-ghost btn-sm" @click="$dispatch('close-chat')" title="Back to Agents" style="padding:4px 8px;margin-right:4px">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
                </button>
                <span x-show="currentAgent && !!displayAgentEmoji(currentAgent)" x-text="displayAgentEmoji(currentAgent)" style="font-size:20px;line-height:1"></span>
                <div style="min-width:0">
                  <div class="font-bold" x-text="currentAgent ? currentAgent.name : ''"></div>
                  <div class="text-xs text-dim truncate" style="font-family:var(--font-mono);font-size:11px" x-text="currentAgent ? currentAgent.model_provider + ':' + currentAgent.model_name : ''"></div>
                </div>
              </div>
              <div class="flex gap-2 items-center">
                <span class="badge badge-running" x-show="currentAgent && !sending" style="animation:fadeIn 0.2s">
                  <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--success);margin-right:2px"></span> Ready
                </span>
                <span class="badge badge-suspended" x-show="sending" style="animation:fadeIn 0.2s">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                  Generating...
                </span>
                <!-- Session switcher -->
                <div style="position:relative">
                  <button class="btn btn-ghost btn-sm" @click="sessionsOpen = !sessionsOpen" title="Sessions" style="position:relative">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
                    <span class="session-count-badge" x-show="sessions.length > 1" x-text="sessions.length"></span>
                  </button>
                  <div class="session-dropdown" x-show="sessionsOpen" @click.outside="sessionsOpen = false" x-transition>
                    <div class="session-dropdown-header">
                      <span class="text-xs font-bold">Sessions</span>
                      <button class="btn btn-ghost btn-sm" @click="createSession()" style="padding:2px 6px;font-size:11px">+ New</button>
                    </div>
                    <template x-for="s in sessions" :key="s.session_id">
                      <div class="session-item" :class="{ active: s.active }" @click="if (!s.active) { switchSession(s.session_id); sessionsOpen = false; }">
                        <span class="session-dot" :class="s.active ? 'active' : ''"></span>
                        <div style="flex:1;min-width:0">
                          <div class="text-xs font-bold truncate" x-text="s.label || 'Session ' + s.session_id.substring(0, 8)"></div>
                          <div class="text-xs text-dim" x-text="s.message_count + ' messages'"></div>
                        </div>
                      </div>
                    </template>
                    <div class="text-xs text-dim" style="padding:8px 12px;text-align:center" x-show="!sessions.length">No sessions</div>
                  </div>
                </div>
                <button class="btn btn-ghost btn-sm" @click="toggleSearch()" title="Search messages (Ctrl+G)">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                </button>
                <button class="btn btn-ghost btn-sm" @click="$store.app.toggleFocusMode()" title="Ctrl+Shift+F">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><g x-show="!$store.app.focusMode"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></g><g x-show="$store.app.focusMode"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></g></svg>
                </button>
                <button class="btn btn-danger btn-sm" @click="killAgent()">Stop</button>
              </div>
            </div>

            <!-- Search bar -->
            <div class="chat-search-bar" x-show="searchOpen" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 transform -translate-y-2" x-transition:enter-end="opacity-100 transform translate-y-0">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" id="chat-search-input" x-model="searchQuery" x-ref="searchInput" placeholder="Search messages..." class="chat-search-input" @keydown.escape="toggleSearch()">
              <span class="text-xs text-dim" x-show="searchQuery.trim()" x-text="filteredMessages.length + ' of ' + messages.length"></span>
              <button class="btn btn-ghost btn-sm" @click="toggleSearch()" style="padding:2px 6px">&times;</button>
            </div>

            <!-- Messages area -->
            <div class="messages" id="messages" x-ref="messagesEl" @scroll.passive="handleMessagesScroll($event)" @dragover.prevent="dragOver = true" @dragleave="dragOver = false" @drop.prevent="handleDrop($event); dragOver = false" @mouseenter="handleMessagesPointerMove($event)" @mousemove="handleMessagesPointerMove($event)" @mousedown="handleMessagesPointerDown($event)" @mouseup="handleMessagesPointerUp($event)" @selectstart="handleMessagesSelectStart($event)" @mouseleave="clearPointerFx($event)">
              <div class="chat-reflection-overlay" aria-hidden="true"></div>
              <div class="chat-grid-overlay" aria-hidden="true"></div>
              <!-- Empty state: no agent selected -->
              <template x-if="!currentAgent">
                <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:32px;opacity:0.8">
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:16px;opacity:0.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                  <h3 style="margin:0 0 8px;font-size:16px;font-weight:600">Select an agent to start chatting</h3>
                  <p class="text-dim" style="font-size:13px;max-width:320px">Choose an agent from the sidebar or go to the Agents tab to create a new one.</p>
                </div>
              </template>
              <!-- Message list -->
              <template x-if="currentAgent">
                <div class="chat-thread">
                  <template x-for="(msg, idx) in filteredMessages" :key="messageRenderKey(msg, idx)">
                    <div class="chat-message-block">
                      <template x-if="msg.is_notice">
                        <div class="chat-day-divider chat-event-divider">
                          <span class="chat-day-divider-line" aria-hidden="true"></span>
                          <span class="chat-day-divider-label">
                            <span
                              class="chat-event-info-icon"
                              x-show="msg.notice_type === 'info' && !isRenameNotice(msg)"
                              x-text="msg.notice_icon || 'i'"
                              aria-hidden="true"
                            ></span>
                            <span x-text="msg.notice_label || 'Model switched'"></span>
                            <button
                              class="chat-notice-action-btn"
                              type="button"
                              x-show="noticeActionVisible(msg)"
                              :disabled="noticeActionBusy(msg)"
                              @click.stop="triggerNoticeAction(msg)"
                              x-text="noticeActionLabel(msg)"
                            ></button>
                          </span>
                          <span class="chat-day-divider-line" aria-hidden="true"></span>
                        </div>
                      </template>
                      <template x-if="isNewMessageDay(filteredMessages, idx)">
                        <div class="chat-day-anchor chat-day-divider" :id="messageDayDomId(msg)" :data-day="messageDayKey(msg)">
                          <span class="chat-day-divider-line" aria-hidden="true"></span>
                          <span class="chat-day-divider-label" x-text="messageDayLabel(msg)"></span>
                          <span class="chat-day-divider-line" aria-hidden="true"></span>
                        </div>
                      </template>
                      <div
                        class="message"
                        x-show="!msg.is_notice"
                        :id="messageDomId(msg, idx)"
                        :class="messageRoleClass(msg) + (msg.thinking ? ' thinking' : '') + (msg.streaming ? ' streaming' : '') + (isGrouped(idx, filteredMessages) ? ' grouped' : '') + (showMessageTail(msg, idx, filteredMessages) ? ' has-tail' : '') + (!isLastInSourceRun(idx, filteredMessages) ? ' has-next-in-run' : '') + (isHoveredMessage(msg, idx) ? ' hover-linked' : '') + (isMessageMetaCollapsed(msg, idx, filteredMessages) ? ' meta-collapsed' : ' meta-expanded') + (isMessageMetaReserveSpace(msg, idx, filteredMessages) ? ' meta-reserved' : '')"
                        @mouseenter="setHoveredMessage(msg, idx)"
                        @mouseleave="clearHoveredMessage()"
                      >
                        <div class="message-avatar" x-show="msg.role === 'agent' && !(isCurrentAgentArchived && isCurrentAgentArchived())">
                          <span class="agent-mark" aria-hidden="true">&infin;</span>
                        </div>
                        <div class="message-body">
                        <div
                          class="message-agent-name"
                          :class="(messageTitleClass(msg) || '') + (msg.terminal ? ' terminal-actor-label' : '')"
                          x-show="showMessageTitle(msg, idx, filteredMessages)"
                        >
                          <span class="message-agent-name-bracket" aria-hidden="true">[</span><span class="message-agent-name-label" x-text="messageTitleLabel(msg)"></span><span class="message-agent-name-bracket" aria-hidden="true">]</span>
                        </div>
                        <!-- Thinking indicator with animated dots -->
                        <div class="message-bubble message-bubble-thinking" x-show="msg.thinking">
                          <div class="thinking-inline-text"><em x-text="thinkingStatusText(msg) || 'Thinking'"></em></div>
                          <div class="typing-dots"><span></span><span></span><span></span></div>
                        </div>
                        <template x-if="msg.terminal && terminalMessageCollapsed(msg, idx, filteredMessages)">
                          <div
                            class="terminal-toolbox"
                            :class="terminalToolboxSideClass(msg)"
                            role="button"
                            tabindex="0"
                            title="Click to expand full output"
                            @click="expandTerminalMessage(msg, idx, filteredMessages)"
                            @keydown.enter.prevent="expandTerminalMessage(msg, idx, filteredMessages)"
                            @keydown.space.prevent="expandTerminalMessage(msg, idx, filteredMessages)"
                          >
                            <span class="terminal-toolbox-icon" aria-hidden="true">
                              <svg viewBox="0 0 24 24" focusable="false">
                                <path d="m4 6 6 6-6 6"></path>
                                <path d="M12 18h8"></path>
                              </svg>
                            </span>
                            <span class="terminal-toolbox-copy">
                              <span class="terminal-toolbox-title">Terminal Output</span>
                              <span class="terminal-toolbox-preview" x-text="terminalToolboxPreview(msg)"></span>
                            </span>
                          </div>
                        </template>
                        <!-- Normal message content -->
                        <div class="message-bubble" :class="{ 'markdown-body': (msg.role === 'agent' || msg.role === 'system') && !msg.thinking && !msg.isHtml, 'message-error': !msg.thoughtStreaming && isErrorMessage(msg), 'thinking-live': !!msg.thoughtStreaming, 'message-finish-bounce': !!msg._finish_bounce }" x-show="msg.text && msg.text.trim() && !msg.thinking && !(msg.terminal && terminalMessageCollapsed(msg, idx, filteredMessages))">
                          <div class="message-bubble-content" x-html="highlightSearch(msg.isHtml ? msg.text : ((msg.role === 'agent' || msg.role === 'system') && !msg.thinking ? renderMarkdown(msg.text) : escapeHtml(msg.text)))"></div>
                        </div>
                        <template x-if="messageProgress(msg)">
                          <div class="chat-progress-wrap">
                            <div class="chat-progress-meta">
                              <span x-text="messageProgress(msg).label"></span>
                              <span x-text="messageProgress(msg).percent + '%'"></span>
                            </div>
                            <div class="chat-progress-track">
                              <span class="chat-progress-fill" :style="progressFillStyle(msg)"></span>
                            </div>
                          </div>
                        </template>
                        <template x-if="msg.file_output && msg.file_output.path">
                          <div class="chat-artifact-card chat-file-output">
                            <div class="chat-artifact-head">
                              <span class="chat-artifact-title">File Output</span>
                              <span class="chat-artifact-path" x-text="msg.file_output.path"></span>
                            </div>
                            <pre class="chat-artifact-pre" x-text="msg.file_output.content || ''"></pre>
                          </div>
                        </template>
                        <template x-if="msg.folder_output && msg.folder_output.path">
                          <div class="chat-artifact-card chat-folder-output">
                            <div class="chat-artifact-head">
                              <span class="chat-artifact-title">Folder Output</span>
                              <span class="chat-artifact-path" x-text="msg.folder_output.path"></span>
                            </div>
                            <pre class="chat-artifact-pre" x-text="msg.folder_output.tree || ''"></pre>
                            <a class="chat-folder-download-link" x-show="msg.folder_output.download_url" :href="msg.folder_output.download_url" target="_blank" rel="noopener">
                              Download archive
                            </a>
                          </div>
                        </template>
                        <!-- Inline images from uploads (shown above tool cards) -->
                        <template x-if="msg.images && msg.images.length">
                          <div style="display:flex;flex-wrap:wrap;gap:8px;margin:8px 0">
                            <template x-for="img in msg.images" :key="img.file_id">
                              <a :href="'/api/uploads/' + img.file_id" target="_blank" style="display:block">
                                <img :src="'/api/uploads/' + img.file_id" :alt="img.filename || 'uploaded image'" style="max-width:320px;max-height:320px;border-radius:8px;border:1px solid var(--border);cursor:pointer" loading="lazy">
                              </a>
                            </template>
                          </div>
                        </template>
                        <template x-for="tool in (msg.tools || [])" :key="tool.id">
                          <div class="tool-card" :class="{ 'tool-card-error': tool.is_error && !isBlockedTool(tool), 'tool-card-blocked': isBlockedTool(tool), 'tool-card-success': isToolSuccessful(tool), 'tool-card-thought': isThoughtTool(tool) }" :data-tool="tool.name">
                            <div class="tool-card-header" @click="tool.expanded = !tool.expanded">
                              <template x-if="isThoughtTool(tool)">
                                <span class="tool-card-thought-brain" aria-hidden="true">
                                  <svg viewBox="0 0 24 24" focusable="false">
                                    <path d="M9 3c-2.8 0-5 2.2-5 5 0 .5.1 1 .2 1.4A3.8 3.8 0 0 0 3 12.1C3 14.3 4.7 16 6.9 16H9" />
                                    <path d="M15 3c2.8 0 5 2.2 5 5 0 .5-.1 1-.2 1.4a3.8 3.8 0 0 1 1.2 2.7c0 2.2-1.7 3.9-3.9 3.9H15" />
                                    <path d="M9 3v13M15 3v13" />
                                    <path d="M9 7.2h1.1c.6 0 1 .4 1 1v.5c0 .6.4 1 1 1h.8c.6 0 1 .4 1 1V11" />
                                    <path d="M9 11.8h1.1c.6 0 1 .4 1 1v.4c0 .6.4 1 1 1h.8c.6 0 1 .4 1 1V16" />
                                  </svg>
                                </span>
                              </template>
                              <template x-if="!isThoughtTool(tool) && tool.running"><div class="tool-card-spinner"></div></template>
                              <template x-if="!isThoughtTool(tool) && !tool.running && isBlockedTool(tool)">
                                <span class="tool-icon-blocked" aria-hidden="true">
                                  <svg viewBox="0 0 24 24" focusable="false">
                                    <path d="M12 3 5 6v6c0 5.2 3.6 8.6 7 10 3.4-1.4 7-4.8 7-10V6l-7-3z"></path>
                                  </svg>
                                </span>
                              </template>
                              <template x-if="!isThoughtTool(tool) && !tool.running && !isBlockedTool(tool) && !tool.is_error"><span class="tool-icon-ok">&#10003;</span></template>
                              <template x-if="!isThoughtTool(tool) && !tool.running && tool.is_error && !isBlockedTool(tool)"><span class="tool-icon-err">&#10007;</span></template>
                              <span class="tool-card-icon" x-show="!isThoughtTool(tool)" x-html="toolIcon(tool.name)"></span>
                              <span class="tool-card-name" x-text="isThoughtTool(tool) ? thoughtToolLabel(tool) : toolDisplayName(tool)"></span>
                              <span x-show="!isThoughtTool(tool)" class="text-xs" :class="{ 'tool-status-blocked': isBlockedTool(tool), 'tool-status-success': isToolSuccessful(tool), 'text-dim': !isBlockedTool(tool) && !isToolSuccessful(tool) }" x-text="toolStatusText(tool)" style="margin-left:auto"></span>
                              <span class="tool-expand-chevron" :style="isThoughtTool(tool) ? 'margin-left:auto' : ''" x-text="tool.expanded ? '▾' : '▸'"></span>
                            </div>
                            <!-- Render generated images above the raw result -->
                            <div x-show="tool._imageUrls && tool._imageUrls.length" style="padding:8px 12px;display:flex;flex-wrap:wrap;gap:8px">
                              <template x-for="iurl in (tool._imageUrls || [])" :key="iurl">
                                <a :href="iurl" target="_blank" style="display:block">
                                  <img :src="iurl" alt="Generated image" style="max-width:320px;max-height:320px;border-radius:8px;border:1px solid var(--border);cursor:pointer" loading="lazy">
                                </a>
                              </template>
                            </div>
                            <!-- Audio player for TTS results -->
                            <div x-show="tool._audioFile" style="padding:8px 12px">
                              <div class="audio-player">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                                <span class="text-xs" x-text="'Audio: ' + tool._audioFile.split('/').pop()"></span>
                                <span class="text-xs text-dim" x-show="tool._audioDuration" x-text="'~' + Math.round((tool._audioDuration || 0) / 1000) + 's'"></span>
                              </div>
                            </div>
                            <div class="tool-card-body" x-show="tool.expanded" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100">
                              <div x-show="tool.input" style="margin-bottom:6px">
                                <div class="tool-section-label">Input</div>
                                <pre class="tool-pre" x-text="formatToolJson(tool.input)"></pre>
                              </div>
                              <div x-show="tool.result">
                                <div class="tool-section-label">Result <span class="text-xs text-muted" x-show="tool.result && tool.result.length > 200" x-text="'(' + tool.result.length + ' chars)'"></span></div>
                                <pre class="tool-pre" :class="{ 'tool-pre-error': tool.is_error, 'tool-pre-short': !tool.is_error && tool.result && tool.result.length < 100, 'tool-pre-medium': !tool.is_error && tool.result && tool.result.length >= 100 && tool.result.length < 500 }" x-text="formatToolJson(tool.result)"></pre>
                              </div>
                            </div>
                          </div>
                        </template>
                        <!-- Timestamp + meta row -->
                        <div
                          class="message-stats-row"
                          x-show="!msg.thinking && ((msg.text && msg.text.trim()) || (msg.tools && msg.tools.length) || msg.meta || msg.ts)"
                        >
                          <button class="message-stat-btn" :class="{ copied: msg._copied }" @click="copyMessage(msg)" :title="msg._copied ? 'Copied' : 'Copy message'">
                            <svg x-show="!msg._copied" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            <svg x-show="msg._copied" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>

                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" :style="sidebarSpawningAgent ? 'opacity:0.45' : ''">
                    <path d="M12 5v14"></path>

                      <template x-if="editingProvider">
                        <span class="flex gap-1" style="align-items:center">
                          <input class="form-input" style="width:160px;font-size:12px" x-model="newProviderValue" placeholder="provider" @keydown.enter="changeProvider()" @keydown.escape="editingProvider = false">
                          <button class="btn btn-primary btn-sm" @click="changeProvider()" :disabled="modelSaving" style="padding:2px 10px">
                            <span x-show="!modelSaving">Save</span><span x-show="modelSaving">...</span>
                          </button>
                          <button class="btn btn-ghost btn-sm" @click="editingProvider = false" style="padding:2px 8px">Cancel</button>
                        </span>
                      </template>
                    </div>
                    <div class="detail-row"><span class="detail-label">Model</span>
                      <template x-if="!editingModel">
                        <span>
                          <span class="detail-value" x-text="detailAgent.model_name"></span>
                          <button class="btn btn-ghost btn-sm" style="margin-left:8px;padding:2px 8px;font-size:11px" @click="editingModel = true; newModelValue = detailAgent.model_provider + '/' + detailAgent.model_name">Change</button>
                        </span>
                      </template>
                      <template x-if="editingModel">
                        <span class="flex gap-1" style="align-items:center">
                          <input class="form-input" style="width:240px;font-size:12px" x-model="newModelValue" placeholder="provider/model" @keydown.enter="changeModel()" @keydown.escape="editingModel = false">
                          <button class="btn btn-primary btn-sm" @click="changeModel()" :disabled="modelSaving" style="padding:2px 10px">
                            <span x-show="!modelSaving">Save</span><span x-show="modelSaving">...</span>
                          </button>
                          <button class="btn btn-ghost btn-sm" @click="editingModel = false" style="padding:2px 8px">Cancel</button>
                        </span>
                      </template>
                    </div>
                    <div class="detail-row"><span class="detail-label">Created</span><span class="detail-value" x-text="detailAgent.created_at ? new Date(detailAgent.created_at).toLocaleString() : '-'"></span></div>

                    <!-- Fallback Model Chain -->
                    <div class="detail-row" style="align-items:flex-start">
                      <span class="detail-label">Fallbacks</span>
                      <div style="flex:1">
                        <template x-if="detailAgent._fallbacks && detailAgent._fallbacks.length > 0">
                          <div>
                            <template x-for="(fb, idx) in detailAgent._fallbacks" :key="idx">
                              <div class="flex gap-1 items-center" style="margin-bottom:4px">
                                <span class="badge" style="font-size:11px;font-family:var(--font-mono)" x-text="(idx+1) + '. ' + fb.provider + '/' + fb.model"></span>
                                <button class="btn btn-ghost btn-sm" style="padding:1px 4px;font-size:10px;color:var(--danger)" @click="removeFallback(idx)">&times;</button>
                              </div>
                            </template>
                          </div>
                        </template>
                        <template x-if="!detailAgent._fallbacks || detailAgent._fallbacks.length === 0">
                          <span class="text-dim" style="font-size:12px">None — add a fallback chain</span>
                        </template>
                        <template x-if="!editingFallback">
                          <button class="btn btn-ghost btn-sm" style="padding:2px 8px;font-size:11px;margin-top:4px" @click="editingFallback = true; newFallbackValue = ''">+ Add</button>
                        </template>
                        <template x-if="editingFallback">
                          <div class="flex gap-1 mt-1" style="align-items:center">
                            <input class="form-input" style="width:220px;font-size:12px" x-model="newFallbackValue" placeholder="provider/model" @keydown.enter="addFallback()" @keydown.escape="editingFallback = false">
                            <button class="btn btn-primary btn-sm" @click="addFallback()" style="padding:2px 10px;font-size:11px">Add</button>
                            <button class="btn btn-ghost btn-sm" @click="editingFallback = false" style="padding:2px 8px;font-size:11px">Cancel</button>
                          </div>
                        </template>
                      </div>
                    </div>
                  </div>
                  <div class="flex gap-2 mt-4">
                    <button class="btn btn-primary" @click="chatWithAgent(detailAgent); showDetailModal = false">Chat</button>
                    <button class="btn btn-ghost" @click="cloneAgent(detailAgent)">Clone</button>
                    <button class="btn btn-ghost" @click="clearHistory(detailAgent)">Clear History</button>
                    <button class="btn btn-danger" @click="killAgent(detailAgent)">Stop</button>
                  </div>
                </div>

                <!-- Tab: Files -->
                <div x-show="detailTab === 'files'">
                  <div x-show="filesLoading" class="text-center text-dim" style="padding:24px">Loading files...</div>
                  <div x-show="!filesLoading && !editingFile">
                    <template x-for="file in agentFiles" :key="file.name">
                      <div class="file-list-item" @click="openFile(file)">
                        <span class="font-mono" style="font-size:13px" x-text="file.name"></span>
                        <span class="text-xs text-dim" x-text="file.exists ? (file.size_bytes + ' bytes') : 'Not created'"></span>
                      </div>
                    </template>
                    <div x-show="!agentFiles.length && !filesLoading" class="text-center text-dim" style="padding:24px">No workspace files found</div>
                  </div>
                  <div x-show="editingFile">
                    <div class="flex justify-between items-center mb-2">
                      <span class="font-bold font-mono" x-text="editingFile"></span>
                      <button class="btn btn-ghost btn-sm" @click="closeFileEditor()">&larr; Back</button>
                    </div>
                    <textarea class="file-editor" x-model="fileContent" style="width:100%;height:280px;resize:vertical"></textarea>
                    <div class="flex gap-2 mt-2">
                      <button class="btn btn-primary btn-sm" @click="saveFile()" :disabled="fileSaving"><span x-show="!fileSaving">Save</span><span x-show="fileSaving">Saving...</span></button>
                      <button class="btn btn-ghost btn-sm" @click="closeFileEditor()">Cancel</button>
                    </div>
                  </div>
                </div>

                <!-- Tab: Config (inline editable) -->
                <div x-show="detailTab === 'config'">
                  <div class="form-group"><label>Name</label><input class="form-input" x-model="configForm.name"></div>
                  <div class="form-group"><label>System Prompt</label><textarea class="form-textarea" x-model="configForm.system_prompt" style="height:80px"></textarea></div>
                  <div class="form-group"><label>Emoji</label>
                    <div class="emoji-grid">
                      <template x-for="em in emojiOptions" :key="em">
                        <button class="emoji-grid-item" :class="{ active: configForm.emoji === em }" @click="configForm.emoji = em" x-text="em"></button>
                      </template>
                    </div>
                  </div>
                  <div class="form-group"><label>Color</label><input type="color" x-model="configForm.color" style="width:48px;height:32px;border:none;cursor:pointer;background:none"></div>
                  <div class="form-group"><label>Archetype</label>
                    <select class="form-select" x-model="configForm.archetype">
                      <option value="">None</option>
                      <template x-for="a in archetypeOptions" :key="a"><option :value="a.toLowerCase()" x-text="a"></option></template>
                    </select>
                  </div>
                  <div class="form-group"><label>Vibe</label>
                    <select class="form-select" x-model="configForm.vibe">
                      <option value="">None</option>
                      <option value="professional">Professional</option><option value="friendly">Friendly</option>
                      <option value="technical">Technical</option><option value="creative">Creative</option>
                      <option value="concise">Concise</option><option value="mentor">Mentor</option>
                    </select>
                  </div>
                  <button class="btn btn-primary mt-4" @click="saveConfig()" :disabled="configSaving">
                    <span x-show="!configSaving">Save Config</span><span x-show="configSaving">Saving...</span>
                  </button>

                  <!-- Tool Filters -->
                  <div class="mt-4" style="border-top:1px solid var(--border);padding-top:16px">
                    <h4 style="margin-bottom:8px;font-size:13px">Tool Filters</h4>
                    <p class="text-xs text-dim" style="margin-bottom:12px">Allowlist: only these tools available (empty = all). Blocklist: these tools excluded.</p>
                    <div class="form-group">
                      <label style="font-size:12px">Allowlist <span class="text-dim" x-text="'(' + toolFilters.tool_allowlist.length + ')'"></span></label>
                      <div class="flex flex-wrap gap-1 mb-1">
                        <template x-for="(t, i) in toolFilters.tool_allowlist" :key="'al-'+i">
                          <span class="badge" style="cursor:pointer" @click="removeAllowTool(t)" :title="'Click to remove ' + t"><span x-text="t"></span> &times;</span>
                        </template>
                      </div>
                      <div class="flex gap-1">
                        <input class="form-input" style="font-size:12px;flex:1" x-model="newAllowTool" placeholder="tool name" @keydown.enter="addAllowTool()">
                        <button class="btn btn-ghost btn-sm" @click="addAllowTool()">Add</button>
                      </div>
                    </div>
                    <div class="form-group">
                      <label style="font-size:12px">Blocklist <span class="text-dim" x-text="'(' + toolFilters.tool_blocklist.length + ')'"></span></label>
                      <div class="flex flex-wrap gap-1 mb-1">
                        <template x-for="(t, i) in toolFilters.tool_blocklist" :key="'bl-'+i">
                          <span class="badge badge-danger" style="cursor:pointer" @click="removeBlockTool(t)" :title="'Click to remove ' + t"><span x-text="t"></span> &times;</span>
                        </template>
                      </div>
                      <div class="flex gap-1">
                        <input class="form-input" style="font-size:12px;flex:1" x-model="newBlockTool" placeholder="tool name" @keydown.enter="addBlockTool()">
                        <button class="btn btn-ghost btn-sm" @click="addBlockTool()">Add</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </template>

        </div><!-- /activeChatAgent picker wrapper -->
      </div>
    </template>

    <!-- Page: Approvals -->
    <template x-if="page === 'approvals'">
      <div x-data="approvalsPage" x-init="loadData()">
        <div class="page-header">
          <div class="tabs mt-3" role="tablist">
            <div class="tab" role="tab" :class="{ active: page === 'agents' }" @click="navigate('agents')">Agents</div>
            <div class="tab" role="tab" :class="{ active: page === 'sessions' }" @click="navigate('sessions')">Sessions</div>
            <div class="tab" role="tab" :class="{ active: page === 'approvals' }" @click="navigate('approvals')">Approvals</div>
          </div>
        </div>
        <div class="page-body">
          <div x-show="loading" class="loading-state"><div class="spinner"></div><span>Loading...</span></div>
          <div x-show="!loading && loadError" class="error-state">
            <span class="error-icon">!</span>
            <p x-text="loadError"></p>
            <button class="btn btn-ghost btn-sm" @click="loadData()">Retry</button>
          </div>
          <template x-if="!loading && !loadError">
            <div>
              <div class="filter-pills mb-4">
                <button class="filter-pill" :class="{ active: filterStatus === 'all' }" @click="filterStatus = 'all'">All</button>
                <button class="filter-pill" :class="{ active: filterStatus === 'pending' }" @click="filterStatus = 'pending'">Pending</button>
                <button class="filter-pill" :class="{ active: filterStatus === 'approved' }" @click="filterStatus = 'approved'">Approved</button>
                <button class="filter-pill" :class="{ active: filterStatus === 'rejected' }" @click="filterStatus = 'rejected'">Rejected</button>
              </div>
              <div x-show="filtered.length === 0" class="empty-state">
                <h4>No approvals</h4>
                <p class="hint">When agents request permission for sensitive actions, they'll appear here.</p>
              </div>
              <div class="card-grid">
                <template x-for="a in filtered" :key="a.id">
                  <div class="card approval-card" :class="{ approved: a.status === 'approved', rejected: a.status === 'rejected', expired: a.status === 'expired' }">
                    <div class="flex justify-between items-center mb-2">
                      <span class="card-header" style="margin:0" x-text="a.action"></span>
                      <span class="badge" :class="{ 'badge-warn': a.status === 'pending', 'badge-success': a.status === 'approved', 'badge-error': a.status === 'rejected', 'badge-muted': a.status === 'expired' }" x-text="a.status"></span>
                    </div>
                    <div class="text-sm text-dim mb-2" x-text="a.description"></div>
                    <div class="text-xs text-dim">Agent: <span x-text="a.agent_name"></span> &middot; <span x-text="timeAgo(a.created_at)"></span></div>
                    <template x-if="a.status === 'pending'">
                      <div class="approval-actions" style="display:flex;gap:8px;margin-top:12px">
                        <button class="btn btn-success btn-sm" @click="approve(a.id)">Approve</button>
                        <button class="btn btn-danger btn-sm" @click="reject(a.id)">Reject</button>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Page: Workflows -->
    <template x-if="page === 'workflows'">
      <div
        x-data="{ wfTab: (localStorage.getItem('infring-workflows-subtab') === 'builder' ? 'builder' : 'list') }"
        @wf-switch-tab.window="
          wfTab = ($event.detail === 'builder' ? 'builder' : 'list');
          localStorage.setItem('infring-workflows-subtab', wfTab);
        "
      >
        <div class="page-header page-header-subtabs-center">
          <div class="tabs mt-3" role="tablist">
            <div class="tab" role="tab" :class="{ active: page === 'scheduler' }" @click="navigate('scheduler')">Scheduler</div>
            <div class="tab" role="tab" :class="{ active: page === 'workflows' }" @click="navigate('workflows')">Workflows</div>
          </div>
          <div class="tabs tabs-subnav" role="tablist">
            <div
              class="tab"
              role="tab"
              :class="{ active: wfTab === 'list' }"
              @click="wfTab = 'list'; localStorage.setItem('infring-workflows-subtab', 'list')"
            >List</div>
            <div
              class="tab"
              role="tab"
              :class="{ active: wfTab === 'builder' }"
              @click="wfTab = 'builder'; localStorage.setItem('infring-workflows-subtab', 'builder')"
            >Visual Builder</div>
          </div>
        </div>

        <!-- Tab: List -->
        <template x-if="wfTab === 'list'">
        <div x-data="workflowsPage">
        <div class="page-body" x-init="loadWorkflows()">
          <div x-show="loading" class="loading-state"><div class="spinner"></div><span>Loading workflows...</span></div>
          <div x-show="!loading && loadError" class="error-state">
            <span class="error-icon">!</span>
            <p x-text="loadError"></p>
            <button class="btn btn-ghost btn-sm" @click="loadData()">Retry</button>
          </div>
          <div x-show="!loading && !loadError">
          <div class="card mb-4" style="border-left:3px solid var(--accent)">
            <div class="font-bold" style="font-size:13px;margin-bottom:4px">What are Workflows?</div>
            <div class="text-sm text-dim" style="line-height:1.6">
              Workflows chain multiple agents into automated pipelines. Each step runs an agent with a prompt template,
              passing output from one step as input to the next. Steps can run sequentially, fan out in parallel, loop, or branch conditionally.
              <br><span style="margin-top:4px;display:inline-block">Try the <strong style="color:var(--accent);cursor:pointer" @click="$dispatch('wf-switch-tab','builder')">Visual Builder</strong> to drag and drop workflow steps.</span>
            </div>
          </div>
          <div class="flex gap-2 mb-4">
            <button class="btn btn-primary btn-sm" @click="showCreateModal = true">+ New Workflow</button>
          </div>
          <div class="table-wrap" x-show="workflows.length">
            <table>
              <thead><tr><th>Name</th><th>Steps</th><th>Created</th><th>Actions</th></tr></thead>
              <tbody>
                <template x-for="wf in workflows" :key="wf.id">
                  <tr>
                    <td><span class="font-bold" x-text="wf.name"></span><br><span class="text-xs text-dim" x-text="wf.description"></span></td>
                    <td x-text="Array.isArray(wf.steps) ? wf.steps.length + ' step' + (wf.steps.length !== 1 ? 's' : '') : wf.steps"></td>
                    <td class="text-xs" x-text="new Date(wf.created_at).toLocaleDateString()"></td>
                    <td>
                      <button class="btn btn-primary btn-sm" @click="showRunModal(wf)">Run</button>
                      <button class="btn btn-ghost btn-sm" @click="showEditModal(wf)">Edit</button>
                      <button class="btn btn-ghost btn-sm" @click="viewRuns(wf)">History</button>
                      <button class="btn btn-danger btn-sm" @click="deleteWorkflow(wf)">Delete</button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
          <div class="empty-state" x-show="!workflows.length">
            <div class="empty-state-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v12M18 9a9 9 0 0 1-9 9"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/></svg>
            </div>
            <h3>No workflows yet</h3>
            <p>Chain multiple agents into automated pipelines with branching, fan-out, and loops.</p>
            <button class="btn btn-primary" @click="showCreateModal = true">Create Workflow</button>
          </div>
          </div>
          <!-- Create modal -->
          <template x-if="showCreateModal">
            <div class="modal-overlay" @click.self="showCreateModal = false" @keydown.escape.window="showCreateModal = false">
              <div class="modal">
                <div class="modal-header"><h3>Create Workflow</h3><button class="modal-close" @click="showCreateModal = false">&times;</button></div>
                <div class="form-group"><label>Name</label><input class="form-input" x-model="newWf.name" placeholder="my-workflow"></div>
                <div class="form-group"><label>Description</label><input class="form-input" x-model="newWf.description" placeholder="What does this workflow do?"></div>
                <div class="mb-4">
                  <div class="form-group" style="margin:0"><label>Steps</label></div>
                  <div class="text-xs text-dim mb-2">Each step runs an agent. Use <code style="color:var(--accent)">{{input}}</code> in prompts to pass the previous step's output.</div>
                  <template x-for="(step, i) in newWf.steps" :key="i">
                    <div class="card mt-2" style="padding:10px">
                      <div class="flex gap-2 items-center">
                        <span class="text-xs text-dim font-bold" x-text="'#' + (i+1)" style="width:24px"></span>
                        <input class="form-input" style="flex:1" x-model="step.name" placeholder="Step name">
                        <input class="form-input" style="flex:1" x-model="step.agent_name" placeholder="Agent name">
                        <select class="form-select" style="width:120px" x-model="step.mode">
                          <option value="sequential">Sequential</option>
                          <option value="fan_out">Fan Out</option>
                          <option value="conditional">Conditional</option>
                          <option value="loop">Loop</option>
                        </select>
                        <button class="btn btn-danger btn-sm" @click="newWf.steps.splice(i,1)">&times;</button>
                      </div>
                      <input class="form-input mt-2" x-model="step.prompt" placeholder="Prompt template (use {{input}})">
                    </div>
                  </template>
                  <button class="btn btn-ghost btn-sm mt-2" @click="newWf.steps.push({name:'',agent_name:'',mode:'sequential',prompt:'{{input}}'})">+ Add Step</button>
                </div>
                <button class="btn btn-primary btn-block" @click="createWorkflow()">Create</button>
              </div>
            </div>
          </template>
          <!-- Run modal -->
          <template x-if="runModal">
            <div class="modal-overlay" @click.self="runModal = null" @keydown.escape.window="runModal = null">
              <div class="modal">
                <div class="modal-header"><h3 x-text="'Run: ' + runModal.name"></h3><button class="modal-close" @click="runModal = null">&times;</button></div>
                <div class="form-group"><label>Input</label><textarea class="form-textarea" x-model="runInput" placeholder="Enter workflow input..."></textarea></div>
                <button class="btn btn-primary btn-block" @click="executeWorkflow()" :disabled="running">
                  <span x-show="!running">Execute</span><span x-show="running">Running...</span>
                </button>
                <div class="card mt-4" x-show="runResult">
                  <div class="card-header">Result</div>
                  <pre style="font-size:11px;white-space:pre-wrap;margin-top:8px;color:var(--text-dim)" x-text="runResult"></pre>
                </div>
              </div>
            </div>
          </template>
          <!-- Edit modal -->
          <template x-if="editModal">
            <div class="modal-overlay" @click.self="editModal = null" @keydown.escape.window="editModal = null">
              <div class="modal">
                <div class="modal-header"><h3 x-text="'Edit: ' + editModal.name"></h3><button class="modal-close" @click="editModal = null">&times;</button></div>
                <div class="form-group"><label>Name</label><input class="form-input" x-model="editWf.name" placeholder="Workflow name"></div>
                <div class="form-group"><label>Description</label><input class="form-input" x-model="editWf.description" placeholder="What does this workflow do?"></div>
                <div class="mb-4">
                  <div class="form-group" style="margin:0"><label>Steps</label></div>
                  <div class="text-xs text-dim mb-2">Each step runs an agent. Use <code style="color:var(--accent)">{{input}}</code> in prompts to pass the previous step's output.</div>
                  <template x-for="(step, i) in editWf.steps" :key="i">
                    <div class="card mt-2" style="padding:10px">
                      <div class="flex gap-2 items-center">
                        <span class="text-xs text-dim font-bold" x-text="'#' + (i+1)" style="width:24px"></span>
                        <input class="form-input" style="flex:1" x-model="step.name" placeholder="Step name">
                        <input class="form-input" style="flex:1" x-model="step.agent_name" placeholder="Agent name">
                        <select class="form-select" style="width:120px" x-model="step.mode">
                          <option value="sequential">Sequential</option>
                          <option value="fan_out">Fan Out</option>
                          <option value="conditional">Conditional</option>
                          <option value="loop">Loop</option>
                        </select>
                        <button class="btn btn-danger btn-sm" @click="editWf.steps.splice(i,1)">&times;</button>
                      </div>
                      <input class="form-input mt-2" x-model="step.prompt" placeholder="Prompt template (use {{input}})">
                    </div>
                  </template>
                  <button class="btn btn-ghost btn-sm mt-2" @click="editWf.steps.push({name:'',agent_name:'',mode:'sequential',prompt:'{{input}}'})">+ Add Step</button>
                </div>
