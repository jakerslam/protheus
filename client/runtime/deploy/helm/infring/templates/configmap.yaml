apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "infring.fullname" . }}-runtime
  labels:
    app.kubernetes.io/name: {{ include "infring.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
{{- range $key, $value := .Values.runtimeConfig }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
  INFRING_SSO_ENABLED: {{ ternary "1" "0" .Values.sso.enabled | quote }}
  INFRING_SSO_PROVIDER: {{ .Values.sso.provider | quote }}
  INFRING_SSO_ISSUER_URL: {{ .Values.sso.issuerUrl | quote }}
  INFRING_SSO_AUDIENCE: {{ .Values.sso.audience | quote }}
  INFRING_SECRETS_VAULT_ENABLED: {{ ternary "1" "0" .Values.secrets.vault.enabled | quote }}
  INFRING_SECRETS_VAULT_ROLE: {{ .Values.secrets.vault.role | quote }}
  INFRING_SECRETS_VAULT_PATH: {{ .Values.secrets.vault.path | quote }}
  INFRING_SECRETS_KMS_ENABLED: {{ ternary "1" "0" .Values.secrets.kms.enabled | quote }}
  INFRING_SECRETS_KMS_PROVIDER: {{ .Values.secrets.kms.provider | quote }}
  INFRING_SECRETS_KMS_KEY_ID: {{ .Values.secrets.kms.keyId | quote }}
  INFRING_NVIDIA_ENABLED: {{ ternary "1" "0" .Values.nvidia.enabled | quote }}
