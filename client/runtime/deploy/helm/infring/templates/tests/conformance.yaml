{{- if .Values.conformance.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "infring.fullname" . }}-conformance
  labels:
    app.kubernetes.io/name: {{ include "infring.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: conformance
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
      command:
        - /bin/sh
        - -c
        - |
          test -n "$NODE_ENV"
          test "$NODE_ENV" = "production"
          test -n "$INFRING_SSO_ENABLED"
      envFrom:
        - configMapRef:
            name: {{ include "infring.fullname" . }}-runtime
{{- if or .Values.secrets.create .Values.secrets.existingSecretName }}
        - secretRef:
            name: {{ include "infring.secretName" . }}
            optional: {{ .Values.secrets.optional }}
{{- end }}
{{- end }}
